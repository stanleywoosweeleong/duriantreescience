     zh:`榴莲是<strong>低地热带</strong>树种，喜炎热湿润：适宜温度约 <strong>24–30 ℃</strong>，长期低于约 22 ℃生长明显放缓，<em class="term">不耐霜冻</em>。喜高湿与充沛而分布合理的降雨（年约 <strong>1500–2500 毫米以上</strong>），但仍需要一段旱季来诱导开花。适宜海拔多在 <strong>600–800 米以下</strong>，过高则果小、品质与产量下降。`,
     en:`Durian is a <strong>lowland tropical</strong> tree that loves heat and humidity: optimum around <strong>24–30 °C</strong>, with growth slowing markedly below about 22 °C and <em class="term">no tolerance of frost</em>. It wants high humidity and generous, well-distributed rainfall (roughly <strong>1,500–2,500 mm+ a year</strong>), yet still needs a dry season to induce flowering. Best below <strong>600–800 m elevation</strong>; higher up, fruit is smaller and quality and yield fall.`},
    {t:"p",
     zh:`土壤方面，最忌积水。理想是<strong>深厚、排水良好、富含有机质</strong>的砂壤至黏壤，<em class="term">pH 约 5.5–6.5（微酸）</em>。地下水位高或黏重不透水的低洼地，会让浅生根系长期缺氧并<strong>引发疫病</strong>。种植时常做高垄、改良有机质、并确保排水沟系顺畅。`,
     en:`For soil, the cardinal sin is waterlogging. The ideal is a <strong>deep, well-drained, organic-rich</strong> sandy to clay loam at <em class="term">pH ~5.5–6.5 (slightly acidic)</em>. High water tables or heavy, impervious low ground starve the shallow roots of oxygen and <strong>invite Phytophthora</strong>. Growers commonly plant on mounds, build up organic matter, and keep drainage channels clear.`},
    {t:"facts", title:{zh:"立地条件",en:"Site requirements"}, rows:[
      [{zh:"温度",en:"Temperature"},{zh:"约 24–30 ℃ · 无霜",en:"~24–30 °C · frost-free"}],
      [{zh:"年降雨",en:"Rainfall"},{zh:"约 1500–2500 mm+",en:"~1,500–2,500 mm+"}],
      [{zh:"海拔",en:"Elevation"},{zh:"多 < 600–800 m",en:"usually < 600–800 m"}],
      [{zh:"土壤",en:"Soil"},{zh:"深厚·排水良好·富有机质",en:"deep, well-drained, organic-rich"}],
      [{zh:"pH",en:"Soil pH"},{zh:"约 5.5–6.5",en:"~5.5–6.5"}]
    ]}
  ]},

{ id:"propagation", num:"XVII", lat:"propagatio", title:{zh:"繁殖",en:"Propagation"}, sub:{zh:"实生砧木 · 嫁接保真",en:"seedling stock · grafting for trueness"},
  blocks:[
    {t:"p",
     zh:`榴莲种子是<em class="term">顽拗型（recalcitrant）</em>的：不耐干燥、不能长期储存，<strong>取出后须尽快播种</strong>，失水即丧失发芽力。实生苗遗传上会分离，<strong>不能保持母本品质</strong>，因此实生主要用作<em class="term">砧木</em>，而非直接结果树。`,
     en:`Durian seed is <em class="term">recalcitrant</em>: it cannot be dried or stored for long and <strong>must be sown promptly</strong>, losing viability if it dries out. Seedlings segregate genetically and <strong>do not stay true</strong> to the parent, so seedlings are used mainly as <em class="term">rootstock</em> rather than as fruiting trees.`},
    {t:"p",
     zh:`要保持优良品种（如猫山王）的特性，必须<em class="term">无性繁殖</em>——通常是<strong>嫁接</strong>（劈接、侧接/贴皮接）或芽接，也有用高压（marcotting）的。嫁接树不仅保真，还能<strong>提早结果</strong>：嫁接苗常在 <strong>4–6 年</strong>投产，而实生树可能需要 <strong>7–12 年甚至更久</strong>。`,
     en:`To keep a fine cultivar's traits (such as Musang King) you must propagate <em class="term">vegetatively</em> — usually by <strong>grafting</strong> (cleft, side-veneer) or budding, sometimes by air-layering (marcotting). Grafted trees stay true and also <strong>bear earlier</strong>: grafts often crop in <strong>4–6 years</strong>, versus <strong>7–12 years or more</strong> for seedlings.`},
    {t:"facts", title:{zh:"繁殖方式对比",en:"Propagation compared"}, rows:[
      [{zh:"实生（种子）",en:"Seedling"},{zh:"作砧木·不保真·结果晚",en:"rootstock · not true · late bearing"}],
      [{zh:"嫁接",en:"Grafting"},{zh:"保真·4–6年结果（主流）",en:"true · bears 4–6 yr (standard)"}],
      [{zh:"芽接",en:"Budding"},{zh:"保真·省接穗",en:"true · economical scion use"}],
      [{zh:"高压",en:"Marcotting"},{zh:"保真·根系较浅",en:"true · shallower roots"}],
      [{zh:"种子特性",en:"Seed"},{zh:"顽拗·须即播",en:"recalcitrant · sow fresh"}]
    ]}
  ]},

{ id:"establishment", lat:"plantatio · fundatio", title:{zh:"建园与种植",en:"Orchard Establishment"}, sub:{zh:"选址 · 株行距 · 防风 · 间作",en:"site · spacing · windbreaks · intercrop"},
  blocks:[
    {t:"p",
     zh:`建园时把地基打对，能受益数十年。关键在于：选<strong>深厚、排水良好</strong>的地块（疫病最爱积水），合理布局与株行距，做好防风与幼树遮荫，并在<strong>雨季初</strong>定植。`,
     en:`Getting the orchard right at planting pays off for decades. The essentials: choose <strong>deep, well-drained</strong> land (Phytophthora loves wet feet), lay out sensible spacing, protect against wind and give young trees some shade, and plant at the <strong>onset of the rainy season</strong>.`},
    {t:"plate", svg:"orchard", no:{zh:"图版 XX",en:"PLATE XX"},
     cap:{zh:"建园布局：迎风面先立防风林；榴莲多按 10×10 m（约 100 株/ha）种植，三角错行更利通风采光；幼树期行间间作以增收、抑草、护土。",
          en:"Orchard layout: windbreaks first on the windward side; durian is commonly planted at 10×10 m (~100 trees/ha), with triangular offset rows for airflow and light; intercrop between rows in the juvenile years for income, weed control and erosion protection."}},
    {t:"facts", title:{zh:"关键决策",en:"Key decisions"},
     rows:[
       [{zh:"株行距 / 密度",en:"Spacing / density"},{zh:"常见 8–16 m；<strong>10×10 m（约 100 株/ha）</strong>最普遍；密植 6×6 m 早期高产但需强修剪、病害风险高，须于 8–10 年间伐。",en:"Commonly 8–16 m; <strong>10×10 m (~100 trees/ha)</strong> is the norm; dense 6×6 m boosts early yield but needs hard pruning, raises disease risk and must be thinned at years 8–10."}],
       [{zh:"排布",en:"Layout"},{zh:"三角/错行比正方形网格<strong>更通风、透光</strong>，降低病害压力。",en:"Triangular/offset rows give <strong>more airflow and light</strong> than a square grid, lowering disease pressure."}],
       [{zh:"防风林",en:"Windbreaks"},{zh:"迎风面先种<strong>双行</strong>速生树（香蕉、竹、银合欢）——幼树不耐强风。",en:"A <strong>double row</strong> of fast-growing trees (banana, bamboo, Leucaena) on the windward side first — young trees can't take strong wind."}],
       [{zh:"遮荫 / 保姆树",en:"Shade / nurse"},{zh:"头 2–3 年以香蕉等提供<strong>半荫</strong>——幼树畏强日照。",en:"Banana or similar for <strong>partial shade</strong> in the first 2–3 years — young trees dislike full sun."}],
       [{zh:"植穴",en:"Planting hole"},{zh:"约 1×1×0.7 m，提前 1–2 月备好；表土＋堆肥回填（偏酸加少量石灰），<strong>根颈与地面齐平</strong>。",en:"About 1×1×0.7 m, prepared 1–2 months ahead; backfill topsoil + compost (a little lime if acidic), with the <strong>root crown level with the ground</strong>."}],
       [{zh:"定植时机",en:"Timing"},{zh:"雨季初（约 5–8 月）；定植后头 2–4 周每日浇水。",en:"Early rainy season (~May–Aug); water daily for the first 2–4 weeks."}]
     ]},
    {t:"p",
     zh:`<strong>幼树期间作（前 3–5 年）</strong>：行间种香蕉、菠萝、生姜、豆科或咖啡/可可，既增收又抑草护土；宜选<strong>浅根、低竞争</strong>的作物，待树冠郁闭即停。要记住榴莲<strong>童期长</strong>——嫁接树约 4–6 年才结果，头几年基本是投入，间作收入正好过渡。`,
     en:`<strong>Intercrop through the juvenile years (first 3–5)</strong>: banana, pineapple, ginger, legumes or coffee/cacao between the rows brings income while suppressing weeds and holding the soil; choose <strong>shallow-rooted, low-competition</strong> crops and stop once the canopy closes. Remember the <strong>long juvenile phase</strong> — grafted trees bear only at ~4–6 years, so the early years are mostly investment, bridged by intercrop income.`},
    {t:"note", kind:"care",
     zh:`榴莲是<strong>浅表吸收根</strong>：除草时勿伤根，覆盖（mulch）保湿控草。最要紧的是<strong>排水</strong>——积水招致疫病根腐，是果园最大的长期风险；平地或湿地应<strong>起垄/堆土栽植</strong>。`,
     en:`Durian is a <strong>shallow surface feeder</strong>: don't damage roots when weeding, and mulch to hold moisture and check weeds. Above all, ensure <strong>drainage</strong> — waterlogging invites Phytophthora root rot, the orchard's biggest long-term risk; on flat or wet land, plant on <strong>raised beds or mounds</strong>.`}
  ]},

{ id:"canopy", lat:"coma · putatio", title:{zh:"树冠管理：整形 · 修剪 · 疏果",en:"Canopy Management: Training, Pruning & Thinning"}, sub:{zh:"中央领导干 · 通风采光 · 合理挂果",en:"central leader · light & air · balanced crop load"},
  blocks:[
    {t:"p",
     zh:`放任不管的榴莲树会长得高、密、易病。<strong>整形与修剪</strong>塑造一个高产、开张、够得着的树冠；<strong>疏果</strong>则把挂果量调到树能养熟的程度。`,
     en:`A durian tree left unmanaged grows tall, dense and disease-prone. <strong>Training and pruning</strong> shape a productive, open, reachable canopy; <strong>thinning</strong> matches the crop load to what the tree can actually ripen.`},
    {t:"plate", svg:"prune", no:{zh:"图版 XXI",en:"PLATE XXI"},
     cap:{zh:"整形要点：保留单一中央领导干与水平结果枝，剪除直立徒长枝与水芽，清空下部 1–2 m 树干，限高 5–10 m；修剪多在采后进行，病枝随见随除并烧毁。",
          en:"Training essentials: keep a single central leader and the horizontal fruiting limbs, cut out upright watershoots, clear the lowest 1–2 m of trunk, and cap height at 5–10 m; prune mainly after harvest and remove and burn diseased wood on sight."}},
    {t:"facts", title:{zh:"整形与修剪",en:"Training & pruning"},
     rows:[
       [{zh:"中央领导干",en:"Central leader"},{zh:"保留一条主导干，剪除竞争性直立枝与水芽；树在<strong>水平枝</strong>上结果最好，直立枝只长个头。",en:"Keep one dominant leader; remove competing uprights and watershoots. Trees fruit best on <strong>horizontal limbs</strong>; uprights only add height."}],
       [{zh:"限高",en:"Height control"},{zh:"顶部控制在约 <strong>5–10 m</strong>，便于喷药与采收。",en:"Cap the top at about <strong>5–10 m</strong> for easier spraying and harvest."}],
       [{zh:"清空下部树干",en:"Clear the lower trunk"},{zh:"去除离地 <strong>1–2 m</strong> 内的枝条——通风、便于作业、减少土溅传病。",en:"Remove branches within <strong>1–2 m</strong> of the ground — airflow, access, and less soil-splash disease."}],
       [{zh:"开张树冠",en:"Open the canopy"},{zh:"疏除内膛过密枝，引入光照与气流（<strong>干燥树冠=少病</strong>）。",en:"Thin crowded interior branches to let in light and air (<strong>a dry canopy means less disease</strong>)."}],
       [{zh:"卫生修剪",en:"Sanitation"},{zh:"随见随剪除枯枝病枝并<strong>烧毁</strong>，工具消毒。",en:"Cut out dead/diseased wood on sight and <strong>burn it</strong>; disinfect tools."}]
     ]},
    {t:"p",
     zh:`<strong>疏果与挂果量</strong>：榴莲常“坐果过多、随后大量落果”，并有大小年。及早<strong>疏去成簇、受损或着生不良</strong>的幼果，把果均匀留在强壮的水平枝上。<strong>少而喂饱</strong>的果实=更大、更饱满、更少断枝，并使年际结果更稳（参见“光合与碳分配”）。高端方案（如甘瑶）每树仅留极少数果。`,
     en:`<strong>Thinning and crop load</strong>: durian tends to over-set and then shed heavily, and to alternate-bear. Thin early — remove <strong>clustered, damaged or poorly-positioned</strong> fruitlets, leaving well-spaced fruit on strong horizontal limbs. <strong>Fewer, better-fed</strong> fruit means bigger size, fuller filling, fewer broken limbs and steadier year-to-year bearing (see Photosynthesis & Carbon Partitioning). Premium programmes such as Kan Yao keep very few fruit per tree.`},
    {t:"note", kind:"field",
     zh:`把修剪当作<strong>防病</strong>来做：一个开张、通风、下部清爽的树冠，雨后干得快，让疫病与炭疽失去所需的湿度。修剪既是塑形，也是最省钱的病害预防。`,
     en:`Prune for the disease you fear most: an open, airy, high-skirted canopy dries fast after rain and denies Phytophthora and anthracnose the humidity they need. Pruning is shaping — and it is also the cheapest disease prevention you have.`}
  ]},

{ id:"yield", lat:"proventus · productivitas", title:{zh:"产量与结果力",en:"Yield & Tree Productivity"}, sub:{zh:"以英亩计 · 童期到盛产 · 树龄与寿命",en:"per acre · juvenile to peak · age & lifespan"},
  blocks:[
    {t:"p",
     zh:`一棵榴莲树能结多少、何时结？两个基本事实决定一切：<strong>童期长</strong>，以及<strong>结果寿命极长</strong>。（本节只谈产量与树龄，不谈成本与回报——鉴于价格波动，任何成本/回报数字都会很快失真。）`,
     en:`How much does a durian tree yield, and when? Two facts shape everything: a <strong>long juvenile phase</strong> and a <strong>very long productive life</strong>. (This section covers yield and tree age only — not cost or return, since with today's price swings any such figure would quickly mislead.)`},
    {t:"plate", svg:"yieldcurve", no:{zh:"图版 XXII",en:"PLATE XXII"},
     cap:{zh:"结果力随树龄上升：嫁接树约 4–6 年始果，头几年 10–40 果/树，约第 10 年可达 ~100 果/树，老树可达 ~200；很老的树产量下降、但品质（与价格）常上升。",
          en:"Productivity rises with age: grafted trees start bearing at ~4–6 years, with 10–40 fruit/tree in the early years, ~100 by about year 10, and up to ~200 in old trees; very old trees yield less but often gain in quality (and price)."}},
    {t:"facts", title:{zh:"结果里程碑",en:"Bearing milestones"},
     rows:[
       [{zh:"始果",en:"First fruit"},{zh:"嫁接树 ~4–6 年；实生树 ~8–15 年。",en:"Grafted ~4–6 years; seedling ~8–15 years."}],
       [{zh:"幼年产量",en:"Early yield"},{zh:"始果头几年约 10–40 果/树。",en:"About 10–40 fruit/tree in the first bearing years."}],
       [{zh:"成龄产量",en:"Mature yield"},{zh:"约第 10 年 ~100 果/树，老树可达 ~200；每果 1.5–4 kg。",en:"~100 fruit/tree by year 10, up to ~200 in old trees; each fruit 1.5–4 kg."}],
       [{zh:"树龄阶段",en:"Age stages"},{zh:"幼 6–15 年、中 15–25 年、老 25 年以上。",en:"Young 6–15 yr, middle-aged 15–25, old 25+."}],
       [{zh:"寿命",en:"Lifespan"},{zh:"80–150 年，可活数百年；很老树量减而质优。",en:"80–150 years, capable of centuries; very old trees yield less but taste finer."}]
     ]},
    {t:"p",
     zh:`<strong>以英亩计</strong>：按常见的 10×10 m，每英亩约 <strong>40 株</strong>。管理良好的成龄园每年约产 <strong>4–6 吨/英亩</strong>（≈10–15 t/ha），但因品种、树龄、管理、天气与授粉成败而<strong>差异极大</strong>。结果并不均衡——榴莲有<strong>大小年</strong>（一年重、一年轻），靠疏果与均衡营养来熨平（参见“光合与碳分配”“树冠管理”）。`,
     en:`<strong>Per acre</strong>: at the common 10×10 m spacing there are about <strong>40 trees</strong> per acre. A well-managed mature orchard yields on the order of <strong>4–6 tonnes per acre per year</strong> (≈10–15 t/ha), but this varies <strong>enormously</strong> with cultivar, age, management, weather and pollination success. Bearing is uneven — durian tends to <strong>alternate-bear</strong> (a heavy year then a light one), smoothed by thinning and balanced nutrition (see Carbon Partitioning and Canopy Management).`},
    {t:"note", kind:"field",
     zh:`产量是<strong>区间，不是承诺</strong>：授粉成败（蝙蝠！）、花期天气、病害与挂果管理，都会让它年际大幅波动。老树之果尤为珍贵——树越老，量越少而风味越深，故古树果常获溢价。`,
     en:`Yields are <strong>ranges, not promises</strong>: pollination success (bats!), weather at flowering, disease and crop-load management swing them widely from year to year. Old-tree fruit is prized — as a tree ages, quantity falls but flavour deepens, so ancient trees command a premium.`}
  ]},

{ id:"safety", lat:"securitas · pomarium", title:{zh:"果园安全",en:"Orchard Safety"}, sub:{zh:"落果伤人 · 防护与警示",en:"falling fruit · protection & warning"},
  blocks:[
    {t:"p",
     zh:`一个严肃却常被忽视的危险：榴莲树高达 30–40 m，一枚 1–4 kg（甚至 8 kg）、带尖刺的果实从高处坠落，足以致命——已有医学记录的颅面、眼球外伤、昏迷乃至失明。在“树上熟”体系里，果实<strong>不定时脱落，且多在夜间与清晨</strong>。`,
     en:`A serious, under-discussed hazard: durian trees reach 30–40 m, and a spiny fruit of 1–4 kg (up to 8 kg) falling from that height can be lethal — the medical literature records skull and facial trauma, eye injuries, loss of consciousness and blindness. In tree-ripened systems fruit drops <strong>unpredictably, most often at night and pre-dawn</strong>.`},
    {t:"plate", svg:"safety", no:{zh:"图版 XXIII",en:"PLATE XXIII"},
     cap:{zh:"落果危险：果重、刺利、坠距高。防护要点——果季勿在结果树下逗留（尤其夜间与清晨），作业时戴安全帽与护目，路径与休息区加网/防护。",
          en:"Falling-fruit hazard: heavy, spiny, and dropping from height. Precautions — don't linger under bearing trees during drop season (especially night and pre-dawn), wear a hard hat and eye protection when working, and net/shield paths and rest areas."}},
    {t:"facts", title:{zh:"关键防护",en:"Key precautions"},
     rows:[
       [{zh:"勿在树下逗留",en:"Don't linger beneath"},{zh:"果季勿在结果树下停留或行走，尤其<strong>夜间与清晨</strong>（落果高峰）。",en:"Stay out from under bearing trees during drop season, especially <strong>night and pre-dawn</strong> (peak drop)."}],
       [{zh:"防护装备",en:"Protective gear"},{zh:"作业时戴<strong>安全帽与护目</strong>。",en:"Wear a <strong>hard hat and eye protection</strong> when working the orchard."}],
       [{zh:"拦截与警示",en:"Nets & warnings"},{zh:"在路径、休息区上方设网/防护；立警示牌，果季禁止访客与儿童入园。",en:"Net or shield paths and rest areas; post warning signs and keep visitors and children out during drop season."}],
       [{zh:"高处作业",en:"Working at height"},{zh:"采收、修剪用合规梯具/安全带，注意坠枝。",en:"Use proper ladders/harness for harvest and pruning, and watch for falling limbs."}]
     ]},
    {t:"note", kind:"care",
     zh:`这是少数<strong>几乎完全可预防</strong>的农场危险。规则很简单：果季里，把结果榴莲树<strong>正下方</strong>视为“禁止逗留区”，切勿站在正下方仰头张望。`,
     en:`This is one of the few farm hazards that is almost <strong>entirely preventable</strong>. The rule is simple: during drop season, treat the space <strong>directly beneath</strong> a bearing durian tree as a no-loiter zone — and never stand under one looking up.`}
  ]},

{ id:"cultivars", num:"XVIII", lat:"cultivares", title:{zh:"主要品种",en:"Cultivars"}, sub:{zh:"以马来西亚 D-编号为主线",en:"the Malaysian D-numbers & Thai clones"},
  blocks:[
    {t:"p",
     zh:`马来西亚以官方登记的 <em class="term">“D-编号”</em>标识品种（D 后接数字）。同一品种常有多个俗名（中/马/英），选购与栽培时以 D-编号最为可靠。以下为几个广为人知的品种——风味描述因人而异，仅作概览，不代表精确等级。`,
     en:`Malaysia identifies cultivars by official <em class="term">"D-numbers"</em> (D followed by a code). One cultivar often carries several common names (Chinese/Malay/English), so the D-number is the most reliable reference. A few widely-known cultivars follow — flavour notes are broad-brush and subjective, not a precise ranking.`},
    {t:"table",
     head:[{zh:"品种",en:"Cultivar"},{zh:"编号",en:"Code"},{zh:"别名",en:"Also known as"},{zh:"概览",en:"Notes"}],
     rows:[
       [{zh:"猫山王",en:"Musang King"},"D197",{zh:"Mao Shan Wang · 貓山王",en:"Mao Shan Wang"},{zh:"名声最盛之一，果肉金黄、浓郁微苦；多待自然脱落。",en:"Among the most famous; golden, rich, slightly bitter aril; usually left to drop."}],
       [{zh:"黑刺",en:"Black Thorn"},"D200",{zh:"Ochee · 黑刺",en:"Ochee"},{zh:"果肉细腻、甜中带苦，近年高端热门。",en:"Fine-textured, sweet-bitter; a recent premium favourite."}],
       [{zh:"红虾",en:"Red Prawn"},"D175",{zh:"Ang Heh · 红虾",en:"Ang Heh"},{zh:"橙红果肉、软糯偏甜，气味相对温和。",en:"Orange-red, soft and sweet, comparatively mild aroma."}],
       [{zh:"D24（苏丹）",en:"D24 (Sultan)"},"D24",{zh:"Sultan · 苏丹王",en:"Sultan"},{zh:"经典老牌，风味均衡、微苦，产量稳定。",en:"A classic; balanced, slightly bitter, reliably productive."}],
       [{zh:"金凤",en:"Golden Phoenix"},"D198",{zh:"Jin Feng · 金鳳",en:"Jin Feng"},{zh:"小果、水分足、苦甜鲜明，气味强。",en:"Small fruit, juicy, sharply bitter-sweet, strong aroma."}],
       [{zh:"金枕头",en:"Monthong"},"—",{zh:"Golden Pillow（泰国）",en:"Thai 'golden pillow'"},{zh:"泰国主力出口种，肉厚、甜、气味温和、耐运。",en:"Thailand's export mainstay; thick, sweet, mild, ships well."}],
       [{zh:"差尼",en:"Chanee"},"—",{zh:"Gibbon（泰国）",en:"Thai 'gibbon'"},{zh:"泰国传统品种，风味浓、成熟快。",en:"Traditional Thai clone; strong flavour, quick to ripen."}]
     ]},
    {t:"note", kind:"field",
     zh:`同名不同种、同种多名的情况很常见。跨州或跨国比较时，<strong>认编号、看来源</strong>比认俗名更可靠。`,
     en:`Same name for different clones — and many names for one clone — is common. When comparing across states or countries, <strong>trust the code and the source</strong> over the common name.`}
  ]},

{ id:"registration", lat:"registratio · certamen", title:{zh:"品种登记与评比",en:"Registering a Clone & Judging a Champion"}, sub:{zh:"D-编号 · PVP · 冠军评审",en:"D-numbers · PVP · championship judging"},
  blocks:[
    {t:"p",
     zh:`马来西亚榴莲上的“<strong>D 编号</strong>”不只是标签，而是一整套<strong>登记程序</strong>的结果；而那些成名的品种，往往还经由<strong>比赛</strong>被发掘。本节讲两件事：一个新品系如何登记，以及一颗“冠军”榴莲如何被评出。`,
     en:`A Malaysian durian's "<strong>D-number</strong>" is not just a label — it is the end of a <strong>registration process</strong>; and the clones that become famous are often surfaced through <strong>competitions</strong>. This section covers two things: how a new clone gets registered, and how a "champion" durian is judged.`},
    {t:"table",
     head:[{zh:"登记途径",en:"Pathway"},{zh:"依据",en:"Basis"},{zh:"所得",en:"What you get"}],
     rows:[
       [{zh:"国家名录 · D 编号",en:"National List · D-number"},{zh:"表型特征鉴定（果形、刺、香气、种子等）；农业部自 1934 年登记、1994 年成为国家品种注册机构。",en:"Phenotypic characterisation (fruit shape, thorns, aroma, seed, etc.); the DOA has registered since 1934 and became National Registrar of Varieties in 1994."},{zh:"官方 D 代号与名录登记（现已过 D239）。",en:"An official D-code and National-List entry (the series now runs past D239)."}],
       [{zh:"植物新品种保护 PVP",en:"Plant Variety Protection (PVP)"},{zh:"2004 年《植物新品种保护法》；DUS 测试——新颖·特异·一致·稳定，并须命名。",en:"Under the Protection of New Plant Varieties Act 2004; the DUS test — New, Distinct, Uniform, Stable — plus a variety name."},{zh:"育种者知识产权（专有权）。",en:"Plant breeders' rights — intellectual-property ownership."}]
     ]},
    {t:"plate", svg:"scorecard", no:{zh:"图版 XXV",en:"PLATE XXV"},
     cap:{zh:"冠军评审记分卡：由农业专家、名厨与业界组成评审团，就味、质、香、色四项打分，尤重风味复杂度与整体平衡，最高荣誉“王中王”。",
          en:"The champion's scorecard: a panel of agricultural experts, celebrity chefs and industry figures scores taste, texture, aroma and colour — with special weight on flavour complexity and overall balance — for the top 'King of Kings' honour."}},
    {t:"p",
     zh:`<strong>登记的核心是“鉴定特征”</strong>。用于判定特异性的形态描述子包括：果实形状与大小、刺的大小与密度、果壳颜色、<strong>果肉（假种皮）颜色·厚度·质地</strong>、香气，以及<strong>种子大小与形状</strong>；若要成为“推荐品种”，还要看农艺表现——产量、抗病性与熟期。候选品系须以<strong>嫁接无性繁殖</strong>固定身份，再经数季田间评估。`,
     en:`<strong>Registration is about characterisation.</strong> The morphological descriptors used to judge distinctness include fruit shape and size, thorn size and density, husk colour, <strong>aril colour, thickness and texture</strong>, aroma, and <strong>seed size and shape</strong>; to be a "recommended" variety it is also weighed on agronomy — yield, disease resistance and season. The candidate must be fixed by <strong>vegetative propagation (grafting)</strong> and evaluated over several seasons in the field.`},
    {t:"table",
     head:[{zh:"评审维度",en:"Dimension"},{zh:"评审要点",en:"What judges look for"}],
     rows:[
       [{zh:"味 Taste",en:"Taste"},{zh:"甜与苦的平衡、风味复杂度（花香、酒香）与回味——行家常以“收尾”论高下。",en:"Balance of sweet and bitter, complexity (floral, alcohol notes) and the finish — connoisseurs judge by the aftertaste."}],
       [{zh:"质 Texture",en:"Texture"},{zh:"绵密、顺滑、少纤维、稠而不水。",en:"Creamy, smooth, fibreless, dense not watery."}],
       [{zh:"香 Aroma",en:"Aroma"},{zh:"浓郁而有层次。",en:"Pungent and complex."}],
       [{zh:"色 Aril colour",en:"Aril colour"},{zh:"金黄而深、均匀。",en:"Deep, even golden."}],
       [{zh:"整体 Overall",en:"Overall"},{zh:"平衡与协调，而非单一的甜。",en:"Balance and harmony, not one-note sweetness."}]
     ]},
    {t:"p",
     zh:`<strong>比赛是发掘管道</strong>：许多优良品种最初正是在<strong>大马农业园艺农游展（MAHA）</strong>等赛事中被识别。如今的旗舰是<strong>世界榴莲锦标赛</strong>（万宜 Bangi 的 BRG 榴莲节），设猫山王、黑刺、<strong>已登记组</strong>与<strong>公开组</strong>（甘榜/非无性系）等类别，最高荣誉为“王中王”；各州也办“榴莲优良”评选。赛事常是登记的前奏——获奖果经鉴定后登记成系（如从自家庭园选出的 Mas Muar D168、由野外发现树嫁接而来的猫山王 D197）。`,
     en:`<strong>Competitions are a discovery pipeline</strong>: many superior cultivars were first identified at shows such as the <strong>Malaysian Agriculture, Horticulture & Agrotourism Show (MAHA)</strong>. The flagship today is the <strong>World Durian Championship</strong> (the BRG Durian Festival at Bangi), with categories such as Musang King, Black Thorn, a <strong>Registered</strong> class and an <strong>Open</strong> class (kampung/non-clonal), topped by the "King of Kings"; states also run "durian unggul" contests. A contest is often the prelude to registration — a winning fruit is characterised and registered as a clone (as with Mas Muar D168 from a home garden, or Musang King D197 grafted from a found tree).`},
    {t:"note", kind:"field",
     zh:`别把两种“评价”混为一谈：<strong>比赛评的是“吃的体验”（感官）</strong>，<strong>登记评的是“品种身份与价值”</strong>（特异·一致·稳定＋农艺表现）。一颗冠军果要成为登记品系，仍须完成完整鉴定——平时就<strong>保存好母株、接穗与记录</strong>，并循农业部/PVP 的正规程序申请。`,
     en:`Don't conflate the two evaluations: a <strong>contest rewards the eating experience (sensory)</strong>, while <strong>registration rewards varietal identity and merit</strong> (distinct, uniform, stable, plus agronomy). A champion fruit still needs full characterisation to become a registered clone — so keep the mother tree, scions and records safe, and apply through the DOA/PVP proper channels.`}
  ]},

{ id:"disorders", num:"XIX", lat:"pathologia · vitia", title:{zh:"主要生理与病害要点",en:"Key Disorders & Diseases"}, sub:{zh:"疫病为首要威胁",en:"Phytophthora leads the threats"},
  blocks:[
    {t:"p",
     zh:`威胁榴莲最主要的病害是<em class="term">疫霉（<span class="lat">Phytophthora palmivora</span>）</em>引起的一系列问题：<strong>根腐、茎干溃疡（patch canker）、树头腐烂与果腐</strong>。它偏爱潮湿、排水不良的环境，常从受伤或长期潮湿的树头侵入。防治的根本在于<strong>排水、通风、避免机械与积水伤害、及时清除病部</strong>，化学防治为辅。`,
     en:`The foremost disease is caused by <em class="term"><span class="lat">Phytophthora palmivora</span></em>: <strong>root rot, stem/patch canker, collar rot and fruit rot</strong>. It thrives in wet, poorly-drained conditions and enters through wounds or a chronically wet collar. Control rests first on <strong>drainage, airflow, avoiding mechanical and waterlogging injury, and removing diseased tissue promptly</strong>, with chemicals as support.`},
    {t:"p",
     zh:`生理性问题多与养分和水分失衡有关：<strong>裂果</strong>（多因水分骤变、钙不足）、<strong>果肉障碍与成熟不均</strong>、<strong>叶尖焦枯</strong>（与硼/钙或盐分有关）、以及前述的<em class="term">大小年</em>与<em class="term">生理落果</em>。多数可通过<strong>稳定水分、均衡营养、合理负载（疏花疏果）</strong>来缓解。`,
     en:`Physiological problems mostly trace to nutrient or water imbalance: <strong>fruit splitting</strong> (often from sudden moisture change or low calcium), <strong>flesh disorders and uneven ripening</strong>, <strong>leaf-tip burn</strong> (linked to boron/calcium or salinity), plus the <em class="term">alternate bearing</em> and <em class="term">physiological drop</em> already described. Most are eased by <strong>steady moisture, balanced nutrition and sensible crop load (thinning)</strong>.`},
    {t:"plate", svg:"physio", no:{zh:"图版 XIX",en:"PLATE XIX"},
     cap:{zh:"常见生理性失调（非病原）：裂果（水分骤变/缺钙）、成熟不均（低温/温度）、湿芯与果肉褐化（水肥失衡）、叶缘焦枯（缺钾/盐分/干旱）——多可靠稳水、均衡营养与合理负载缓解。",
          en:"Common physiological disorders (not pathogens): fruit splitting (moisture swings / low calcium), uneven ripening (chilling / temperature), wet core and flesh browning (water–nutrient imbalance), and leaf-margin burn (potassium / salinity / drought) — most eased by steady water, balanced nutrition and sensible crop load."}},
    {t:"note", kind:"care",
     zh:`本手册聚焦“树体科学”原理，病虫害的<strong>具体诊断与用药</strong>请以当地农业部门、正规诊断与标签指导为准。识别错误或误用药剂可能造成损失或残留风险。`,
     en:`This handbook focuses on tree-science principles; for <strong>specific pest/disease diagnosis and chemical use</strong>, rely on local agricultural authorities, proper diagnosis and label guidance. Misidentification or misuse can cause losses or residue risks.`}
  ]},

{ id:"pests", lat:"pestes · morbi · IPM", title:{zh:"病虫害与综合防治（IPM）",en:"Pests & Diseases (IPM)"}, sub:{zh:"识别 · 预防 · 生物与化学并用",en:"identify · prevent · biological & chemical"},
  blocks:[
    {t:"p",
     zh:`除了疫病（见“主要生理与病害要点”），榴莲还面对一大群害虫与真菌。取胜之道是<strong>综合防治（IPM）</strong>：先以健壮、开张、排水良好的树体加卫生管理来<strong>预防</strong>；再<strong>监测</strong>；然后以<strong>生物</strong>为主、必要时<strong>化学</strong>为辅并<strong>轮换</strong>。`,
     en:`Beyond Phytophthora (see Key Disorders & Diseases), durian faces a broad complex of insects and fungi. The winning approach is <strong>IPM</strong>: <strong>prevent</strong> first with healthy, open, well-drained trees plus sanitation; <strong>monitor</strong>; then intervene <strong>biologically</strong> and, where needed, <strong>chemically with rotation</strong>.`},
    {t:"plate", svg:"threats", no:{zh:"图版 XXIV",en:"PLATE XXIV"},
     cap:{zh:"威胁分布图：叶片（粉蚧·蓟马·螨·煤污·藻斑·炭疽）、果实（蛀果虫·果腐）、干枝（斑块溃疡·粉红病·钻蛀）、根部（根腐·线虫）。对症先要识部位。",
          en:"A threat map: leaves (mealybug, thrips, mites, sooty mould, algal spot, anthracnose), fruit (borers, rot), trunk/branches (patch canker, pink disease, borers) and roots (rot, nematodes). Knowing where a problem strikes is the first step to treating it."}},
    {t:"table",
     head:[{zh:"主要虫害",en:"Key pest"},{zh:"危害",en:"Damage"},{zh:"部位",en:"Where"}],
     rows:[
       [{zh:"蛀果虫 Fruit borer",en:"Fruit borer"},{zh:"Conogethes punctiferalis；幼虫蛀果，<strong>最严重</strong>。",en:"Conogethes punctiferalis; larvae bore the fruit — <strong>the worst pest</strong>."},{zh:"果",en:"Fruit"}],
       [{zh:"蛀种虫 Seed borer",en:"Seed borer"},{zh:"Mudaria 属；蛀食种子与果肉，减产。",en:"Mudaria spp.; bores seed and pulp, cutting yield."},{zh:"果/种",en:"Fruit/seed"}],
       [{zh:"干枝钻蛀虫 Stem borers",en:"Stem/branch borers"},{zh:"Batocera、蠹甲等；隧道断输导→枯枝，常继发于疫病。",en:"Batocera, ambrosia beetles; tunnels disrupt transport → dieback, often after Phytophthora."},{zh:"干枝",en:"Trunk/branch"}],
       [{zh:"粉蚧与蚧 Mealybugs/scale",en:"Mealybugs / scale"},{zh:"吸汁；蜜露引发<strong>煤污</strong>、果实变黑降等。",en:"Sap-sucking; honeydew triggers <strong>sooty mould</strong>, blackening fruit and cutting grade."},{zh:"叶/果",en:"Leaf/fruit"}],
       [{zh:"蓟马·螨·木虱",en:"Thrips / mites / psyllids"},{zh:"刺吸致叶片损伤、失绿、卷曲。",en:"Rasping/sucking causes leaf damage, chlorosis and curl."},{zh:"叶",en:"Leaves"}],
       [{zh:"象甲·食叶虫",en:"Weevils / leaf-eaters"},{zh:"啃食叶片，苗期影响大。",en:"Defoliation, worst on young trees."},{zh:"叶",en:"Leaves"}],
       [{zh:"线虫·脊椎动物",en:"Nematodes / vertebrates"},{zh:"根结线虫伤根；松鼠、猴、野猪等取食果实。",en:"Root-knot nematodes damage roots; squirrels, monkeys and boar eat fruit."},{zh:"根/果",en:"Root/fruit"}]
     ]},
    {t:"table",
     head:[{zh:"病害（疫病以外）",en:"Disease (beyond Phytophthora)"},{zh:"病原",en:"Cause"},{zh:"症状",en:"Symptom"}],
     rows:[
       [{zh:"炭疽病 Anthracnose",en:"Anthracnose"},"Colletotrichum gloeosporioides",{zh:"叶、果暗色病斑，落果、梢枯。",en:"Dark lesions on leaves and fruit, fruit drop, tip dieback."}],
       [{zh:"粉红病 Pink disease",en:"Pink disease"},"Erythricium salmonicolor",{zh:"枝上粉红菌层，环割致枝枯。",en:"A pink fungal crust girdling branches until they die."}],
       [{zh:"藻斑病 Algal spot",en:"Algal spot"},"Cephaleuros virescens",{zh:"叶、枝上橙锈色天鹅绒状斑。",en:"Orange, rust-coloured velvety spots on leaves and twigs."}],
       [{zh:"枝枯/果腐 Dieback",en:"Dieback / fruit rot"},"Lasiodiplodia theobromae",{zh:"枯枝、果腐、叶灼。",en:"Dieback, fruit rot and leaf scorch."}],
       [{zh:"叶斑/叶枯 Leaf spot",en:"Leaf spot / blight"},"Phomopsis · Rhizoctonia",{zh:"褐色坏死斑，常带黄晕。",en:"Brown necrotic spots, often with a yellow halo."}],
       [{zh:"煤污病 Sooty mould",en:"Sooty mould"},{zh:"蜜露上的腐生菌",en:"Saprophyte on honeydew"},{zh:"黑色煤层，降低光合与卖相。",en:"A black coating that cuts photosynthesis and looks."}]
     ]},
    {t:"p",
     zh:`<strong>IPM 三步</strong>：① <strong>栽培/预防</strong>（第一道防线）——卫生（清除并烧毁病果病枝）、开张通风的修剪、良好排水、均衡营养、避免树干创伤、抗性砧木、套袋防蛀果；② <strong>生物防治</strong>——木霉（Trichoderma）抑真菌/疫病，白僵菌（Beauveria）与绿僵菌（Metarhizium）治虫，枯草芽孢杆菌与假单胞菌作拮抗；③ <strong>化学（靶向）</strong>——<strong>轮换作用机理</strong>以延缓抗性（参见“养分与农药运输”按内吸性选药），并遵守标签与残留限量（参见“出口认证与合规”）。`,
     en:`<strong>IPM in three steps</strong>: ① <strong>cultural / prevention</strong> (the first line) — sanitation (remove and burn infected fruit and wood), open airy pruning, good drainage, balanced nutrition, no trunk wounds, resistant rootstocks, and fruit bagging against borers; ② <strong>biological control</strong> — Trichoderma against soil fungi/Phytophthora, Beauveria bassiana and Metarhizium against insects, Bacillus and Pseudomonas as antagonists; ③ <strong>chemical (targeted)</strong> — <strong>rotate modes of action</strong> to slow resistance (see How Nutrients & Agrochemicals Move for matching a product's systemicity to the target) and respect label and MRL limits (see Certifications & Export Compliance).`},
    {t:"note", kind:"care",
     zh:`最便宜的防治是<strong>预防</strong>：排水良好、树冠开张、营养均衡、卫生到位的果园，能抵御上表大多数问题。化学药剂应作为<strong>靶向补充</strong>而非首选——先监测、正确识别、再轮换用药。凡是<strong>无法确诊</strong>的，务必先取得诊断再喷药。`,
     en:`The cheapest control is <strong>prevention</strong>: a well-drained, open-canopy, well-nourished, sanitised orchard resists most of the list above. Reach for chemistry as a <strong>targeted supplement</strong>, not the first move — monitor, identify correctly, then rotate. For anything you <strong>can't identify</strong>, get a proper diagnosis before you spray.`}
  ]},

{ id:"distribution", num:"XX", lat:"distributio · orbis", title:{zh:"分布与产区",en:"Where Durian Grows"}, sub:{zh:"第二部分 · 走遍东南亚与更远处",en:"Part Two · across SE Asia & beyond"},
  blocks:[
    {t:"p",
     zh:`<em class="term">Durio</em> 属约有 30 个物种、至少 9 种可食，但真正进入国际贸易的只有 <em class="term">Durio zibethinus</em> 一种。它的栽培带环绕赤道热带：以东南亚为核心，向北延伸到中国南部，向西到南印度、斯里兰卡，向南到北澳大利亚、巴布亚新几内亚，另有马达加斯加、夏威夷与佛罗里达等零星产区。仅泰国就有 300 多个命名品种，马来西亚登记约 200 个。`,
     en:`The genus <em class="term">Durio</em> holds about 30 species, at least nine edible, yet only <em class="term">Durio zibethinus</em> reaches international trade. Its cultivation belts the equatorial tropics — centred on Southeast Asia, reaching north into southern China, west to south India and Sri Lanka, south to northern Australia and Papua New Guinea, with scattered plantings in Madagascar, Hawai'i and Florida. Thailand alone has 300+ named varieties; Malaysia has ~200 registered.`},
    {t:"plate", svg:"mapSEA", no:{zh:"图 XX",en:"Plate XX"},
     cap:{zh:"产区示意图：金色节点为主产国，空心为小型/新兴产区，箭头指向主导需求的中国市场（位置为示意，非精确地图）。",en:"Schematic of growing regions: gold nodes are major producers, open circles minor/emerging, the arrow points to the demand-dominant China market (positions are indicative, not a precise map)."}},
    {t:"p",
     zh:`理解整个行业，必须先理解<strong>中国</strong>这个需求引擎。中国是全球最大的榴莲进口国与消费国，进口量从 2015 年的约 30 万吨飙升到 2024 年的约 156 万吨；东南亚对华榴莲贸易额从 2017 年的约 5.5 亿美元增至 2023 年的约 67 亿美元。这一个市场，几乎左右了每个产国的品种选择、采收方式与准入规则。`,
     en:`To read the whole industry, start with the demand engine — <strong>China</strong>. It is the world's largest durian importer and consumer; imports leapt from roughly 0.3 Mt in 2015 to about 1.56 Mt in 2024, and Southeast Asia's durian trade to China grew from about US$0.55 bn (2017) to about US$6.7 bn (2023). This single market shapes clone choice, harvest method and access rules across almost every producing country.`},
    {t:"table",
     head:[{zh:"产地",en:"Origin"},{zh:"对华鲜果准入",en:"Fresh access to China"},{zh:"角色",en:"Role"}],
     rows:[
       [{zh:"泰国",en:"Thailand"},"2003+",{zh:"最大出口国，主力金枕头，切果后熟、耐运。",en:"Largest exporter; Monthong-led; cut-mature, ships well."}],
       [{zh:"越南",en:"Vietnam"},"2022",{zh:"增长最快，靠近中国，Ri6/Dona 为主。",en:"Fastest-growing; close to China; Ri6/Dona."}],
       [{zh:"马来西亚",en:"Malaysia"},"2024（冻果 2019）",{zh:"高端树上熟，猫山王/黑刺领衔。",en:"Premium tree-ripened; Musang King/Black Thorn."}],
       [{zh:"菲律宾",en:"Philippines"},"2022–23",{zh:"棉兰老岛，晚季，Puyat 为主。",en:"Mindanao; late season; Puyat-led."}],
       [{zh:"印度尼西亚",en:"Indonesia"},"起步中（冻果 2025）",{zh:"产量大，以内销为主，正拓展出口。",en:"Huge volume, mostly domestic, now pushing export."}],
       [{zh:"中国·海南",en:"China · Hainan"},"本土种植",{zh:"由买家转为种植者，产量为补充。",en:"Buyer-turned-grower; output supplements imports."}]
     ]},
    {t:"note", kind:"field",
     zh:`各国产量与排名因年份与统计口径（FAO / 海关 / 行业）而异，本部分数字多为<strong>近似值</strong>，用于把握格局而非精确对比。`,
     en:`Country output and rankings vary by year and source (FAO / customs / industry); figures here are mostly <strong>approximate</strong>, meant for orientation rather than precise comparison.`}
  ]},

{ id:"thailand", num:"XXI", lat:"Thailandia", title:{zh:"泰国",en:"Thailand"}, sub:{zh:"产量与出口第一 · 反季与人工授粉",en:"#1 by output & export · off-season & hand pollination"},
  blocks:[
    {t:"p",
     zh:`泰国是全球第一大生产与出口国，核心产区在东部（尖竹汶 Chanthaburi、罗勇 Rayong、达叻 Trat）与南部（春蓬、素叻他尼、洛坤）。品种超过 200 个，但真正主导出口的只有少数几个。`,
     en:`Thailand is the world's largest producer and exporter, centred in the East (Chanthaburi, Rayong, Trat) and the South (Chumphon, Surat Thani, Nakhon Si Thammarat). Of its 200+ varieties, only a handful dominate export.`},
    {t:"facts", title:{zh:"主力品种与熟期",en:"Leading clones & maturity"},
     rows:[
       [{zh:"金枕头 Monthong",en:"Monthong (Golden Pillow)"},{zh:"约占面积 41%；中熟约 120–130 天；肉厚、味温和、耐运。",en:"~41% of area; medium ~120–130 DAF; thick, mild, ships well."}],
       [{zh:"差尼 Chanee",en:"Chanee (Gibbon)"},{zh:"约占 33%；早熟约 100–105 天；风味浓，对疫病较耐。",en:"~33%; early ~100–105 DAF; strong flavour, more Phytophthora-tolerant."}],
       [{zh:"甘瑶 Kan Yao",en:"Kan Yao (D158)"},{zh:"高价品种，每树仅留 1–4 果以集中养分。",en:"Premium; only 1–4 fruit kept per tree to concentrate quality."}],
       [{zh:"Gradum-tong",en:"Gradum-tong"},{zh:"早熟；常作授粉品种以提高坐果。",en:"Early; often used as a pollenizer to lift fruit set."}]
     ]},
    {t:"p",
     zh:`泰国有两项标志性技术。其一是<strong>反季生产</strong>：在成熟叶梢上喷施<em class="term">多效唑（paclobutrazol）</em>（约 750–1500 ppm）配合一段短暂旱期，可提前或错开花期，把采收分散到全年、稳住价格。其二是<strong>夜间人工授粉</strong>：用毛刷把花粉点到柱头上（尤其 Kan Yao、Chanee），提高坐果率并让每室结满。`,
     en:`Thailand leans on two signature techniques. First, <strong>off-season production</strong>: foliar <em class="term">paclobutrazol</em> (~750–1500 ppm) on mature flush, combined with a short dry spell, shifts flowering to spread harvest across the year and steady prices. Second, <strong>night hand pollination</strong>: dabbing pollen onto the stigma with a brush (especially for Kan Yao and Chanee) raises fruit set and fills the locules.`},
    {t:"plate", svg:"handpoll", no:{zh:"图 XXI",en:"Plate XXI"},
     cap:{zh:"夜间人工授粉：花在傍晚开放、蝙蝠为天然传粉者，商业果园常在夜间以毛刷补充异花授粉。",en:"Night hand pollination: flowers open in the evening and bats are the natural pollinators; commercial orchards add brush cross-pollination after dark."}},
    {t:"p",
     zh:`<strong>采收哲学</strong>：泰国多在“成熟但仍硬”时（按开花后天数＋干物质率判断）<em class="term">剪果</em>，再离树后熟 —— 质地更结实、风味更温和、货架期更长，适合远距离冷链出口。质量以泰国农业标准（TAS，含干物质下限）管理。`,
     en:`<strong>Harvest philosophy</strong>: Thai fruit is usually <em class="term">cut mature-but-firm</em> (judged by days-after-anthesis plus dry-matter) and ripened off-tree — firmer texture, milder flavour, longer shelf life, suited to long cold-chain export. Quality is governed by Thai Agricultural Standards (TAS), including dry-matter minimums.`},
    {t:"note", kind:"care",
     zh:`多效唑是一种生长延缓剂，存在土壤残留与果实残留顾虑；许多高端与有机方案刻意不用。使用须遵标签与残留限量（MRL）。`,
     en:`Paclobutrazol is a growth retardant with soil- and fruit-residue concerns; many premium and organic programmes deliberately avoid it. If used, follow the label and residue limits (MRLs).`}
  ]},

{ id:"malaysia", num:"XXII", lat:"Malaysia", title:{zh:"马来西亚",en:"Malaysia"}, sub:{zh:"D-编号体系 · 树上熟的高端路线",en:"the D-number system · the tree-ripened premium route"},
  blocks:[
    {t:"p",
     zh:`马来西亚走高端路线。农业部（DOA）自 1934 年起以 <em class="term">D-编号</em> 登记品种，累计约 200 个。<strong>认编号比认俗名可靠</strong>：同一俗名在不同州、不同国可能指不同品种。`,
     en:`Malaysia occupies the premium tier. The Department of Agriculture (DOA) has registered clones under the <em class="term">D-number</em> system since 1934 — about 200 in all. <strong>The code is more reliable than the name</strong>: one popular name can mean different clones across states and countries.`},
    {t:"facts", title:{zh:"代表性登记品种",en:"Signature registered clones"},
     rows:[
       [{zh:"D197 猫山王",en:"D197 Musang King"},{zh:"Raja Kunyit；1993 年登记；受地理标志（GI）保护，MS 2686 标准。",en:"Raja Kunyit; registered 1993; GI-protected, MS 2686 standard."}],
       [{zh:"D200 黑刺",en:"D200 Black Thorn"},{zh:"Ochee；近年高端热门，甜中带苦。",en:"Ochee; a recent premium star; sweet with bitterness."}],
       [{zh:"D175 红虾 / D24 苏丹",en:"D175 Red Prawn / D24 Sultan"},{zh:"红虾橙红软糯；D24 为经典老牌、风味均衡。",en:"Red Prawn is orange & soft; D24 is the balanced old classic."}],
       [{zh:"D198 金凤 / MARDI 杂交",en:"D198 Golden Phoenix / MARDI hybrids"},{zh:"金凤（Jin Feng/Kim Hong）小果浓香；MDUR78/79/88（D188–D190）对斑块溃疡有一定耐性。",en:"Golden Phoenix (Jin Feng/Kim Hong), small & pungent; MDUR78/79/88 (D188–D190) show some patch-canker tolerance."}]
     ]},
    {t:"p",
     zh:`<strong>采收哲学</strong>：马来西亚高端果讲究<em class="term">树上熟</em> —— 让果实自然脱落（常用网接住），风味更饱满、更软、更香，但货架期短，历史上主要以冷冻出口。`,
     en:`<strong>Harvest philosophy</strong>: Malaysia's premium fruit is <em class="term">tree-ripened</em> — left to abscise and fall (often caught in nets), giving fuller, softer, more aromatic flesh but a short shelf life, historically exported frozen.`},
    {t:"p",
     zh:`<strong>对华准入</strong>：冷冻整果自 2019 年起（协议 2017）；<strong>鲜果整果准入于 2024 年 6 月</strong>获批，以包机空运“树上熟”鲜果进入中国。约七成以上出口销往中国。主季约 6–8 月（彭亨、柔佛、槟城），小季约 12 月–翌年 1 月。`,
     en:`<strong>China access</strong>: frozen whole fruit since 2019 (protocol 2017); <strong>fresh whole-fruit access was granted in June 2024</strong>, moving "tree-ripened" fresh fruit to China by charter air. Over 70% of exports go to China. Main season ~Jun–Aug (Pahang, Johor, Penang); minor season ~Dec–Jan.`},
    {t:"note", kind:"field",
     zh:`马来西亚榴莲价格以波动著称：丰产季猫山王地头价可从旺季的每公斤数十令吉暴跌。<strong>分散品种与销售渠道</strong>是抵御价格风险的关键。`,
     en:`Malaysian prices are famously volatile: in a bumper season Musang King farm-gate prices can crash far below peak. <strong>Diversifying clones and sales channels</strong> is the main hedge.`}
  ]},

{ id:"vietnam", num:"XXIII", lat:"Vietnamia", title:{zh:"越南",en:"Vietnam"}, sub:{zh:"十年六倍 · 靠近中国的颠覆者",en:"6× in a decade · the disruptor next door"},
  blocks:[
    {t:"p",
     zh:`越南是搅局者。十年间栽培面积扩张约 6 倍至约 18 万公顷，产量已超过 150 万吨；2025 年榴莲出口额约 40 亿美元，占其果蔬出口的近一半。中央高地（多乐 Dak Lak）是最大产区。`,
     en:`Vietnam is the disruptor. In a decade its planted area expanded roughly 6× to about 180,000 ha, with output now above 1.5 Mt; 2025 durian export value reached about US$4 bn — nearly half of all fruit-and-vegetable exports. The Central Highlands (Dak Lak) is the largest region.`},
    {t:"facts", title:{zh:"主力品种",en:"Leading clones"},
     rows:[
       [{zh:"Ri6（本地）",en:"Ri6 (local)"},{zh:"金黄绵密、种子小、香气足 —— 中国市场最爱。",en:"Golden, creamy, small-seeded, aromatic — the China favourite."}],
       [{zh:"Dona（＝金枕头）",en:"Dona (= Monthong)"},{zh:"泰国引进；与 Ri6 合计约占面积 90–95%。",en:"Thai import; with Ri6 makes up ~90–95% of acreage."}],
       [{zh:"猫山王 / 黑刺",en:"Musang King / Black Thorn"},{zh:"少量种植，走高价段。",en:"Grown in smaller volume for the premium segment."}],
       [{zh:"采收窗（因产区）",en:"Harvest window (by region)"},{zh:"Ri6 约花后 85–120 天；Dona 约 110–135 天。",en:"Ri6 ~85–120 DAF; Dona ~110–135 DAF."}]
     ]},
    {t:"p",
     zh:`<strong>优势</strong>在于地利：距中国近（冷藏车 2–3 天可达）、成本有竞争力、部分产区可错峰供应。中国占其出口市场九成以上。`,
     en:`Its <strong>edge</strong> is geography: close to China (2–3 days by refrigerated truck), competitive cost, and staggered regional supply. China is over 90% of its export market.`},
    {t:"p",
     zh:`<strong>合规才是命门</strong>：自 2022 年起，每个果园须有 GACC 登记的<em class="term">种植区代码</em>、每个包装厂须有<em class="term">设施代码</em>，无码货柜在口岸被拒。2025 年初因镉、金胺 O（Auramine O）等残留问题遭退运、出口一度骤降，其后靠加强合规才回升；新国标（TCVN）设定干物质下限（约 32%）。`,
     en:`<strong>Compliance is the real gate</strong>: since 2022 every orchard needs a GACC-registered <em class="term">growing-area code</em> and every packer a <em class="term">facility code</em> — uncoded containers are rejected at the border. In early 2025, residue issues (cadmium, Auramine O) triggered rejections and a slump before compliance restored momentum; a new national standard (TCVN) sets dry-matter minimums (~32%).`},
    {t:"note", kind:"care",
     zh:`扩张速度快过标准化：地块零散、过量施肥与使用未批准药剂，已多次引发检疫与食安警告。<strong>可追溯与残留控制</strong>如今直接决定能否进入市场。`,
     en:`Expansion has outrun standardisation: fragmented plots, over-fertilising and unapproved chemicals have repeatedly drawn quarantine and food-safety warnings. <strong>Traceability and residue control</strong> now decide market access.`}
  ]},

{ id:"indonesia", num:"XXIV", lat:"Indonesia", title:{zh:"印度尼西亚",en:"Indonesia"}, sub:{zh:"内销巨人 · 多样性的故乡",en:"the domestic giant · a home of diversity"},
  blocks:[
    {t:"p",
     zh:`印尼是产量巨人，历史上几乎全部内销（本国胃口极大）。拥有 100 多个地方品种；由于婆罗洲与苏门答腊本就在榴莲原生分布带内，这里是<strong>遗传多样性的核心</strong>。旺季常在 12 月–翌年 2 月，与大陆东南亚错开。`,
     en:`Indonesia is a volume giant, historically almost all consumed at home (a vast domestic appetite). It holds 100+ local varieties and, because Borneo and Sumatra lie within durian's native range, is a <strong>centre of genetic diversity</strong>. Its peak often falls Dec–Feb, offset from mainland SE Asia.`},
    {t:"facts", title:{zh:"代表品种",en:"Notable varieties"},
     rows:[
       [{zh:"Bawor（Banyumas）",en:"Bawor (Banyumas)"},{zh:"多品种嫁接选育，果实极大（常 6–9 公斤）。",en:"A grafted multi-variety selection; very large fruit (often 6–9 kg)."}],
       [{zh:"Montong / Matahari",en:"Montong / Matahari"},{zh:"本地化的金枕头系与热门商业种。",en:"Localised Monthong-type and a popular commercial clone."}],
       [{zh:"Petruk / Sunan",en:"Petruk / Sunan"},{zh:"中爪哇经典地方种。",en:"Classic Central Java local clones."}],
       [{zh:"红肉榴莲 D. graveolens",en:"Red-flesh D. graveolens"},{zh:"原生近缘种，风味独特。",en:"A native relative species with a distinctive flavour."}]
     ]},
    {t:"p",
     zh:`<strong>出口转向</strong>：印尼已开始进军中国市场（2025 年首次冻榴莲出口），并把榴莲定位为国民水果，扩大出口是明确的政策目标。`,
     en:`<strong>The export turn</strong>: Indonesia has begun entering the China market (its first frozen-durian shipment in 2025) and frames durian as a national fruit, with scaling exports a stated policy goal.`},
    {t:"note", kind:"field",
     zh:`身处原生分布带，印尼保有罕见的品种与近缘种资源 —— 这是砧木选育与未来育种的宝库。`,
     en:`Sitting in the native range, Indonesia holds unusual clone and wild-relative resources — a reservoir for rootstock selection and future breeding.`}
  ]},

{ id:"philippines", num:"XXV", lat:"Philippinae", title:{zh:"菲律宾",en:"Philippines"}, sub:{zh:"棉兰老岛 · 晚季的结构性优势",en:"Mindanao · the late-season edge"},
  blocks:[
    {t:"p",
     zh:`棉兰老岛是菲律宾的榴莲心脏 —— 达沃（Davao，“榴莲共和国”）、哥打巴托、布基农。它有<strong>反季优势</strong>：约 4–6 月开花、8–11 月采收，比大陆东南亚更晚。`,
     en:`Mindanao is the country's durian heart — Davao (the "durian republic"), Cotabato, Bukidnon. It enjoys a <strong>counter-seasonal edge</strong>: flowering ~Apr–Jun and harvest ~Aug–Nov, later than mainland SE Asia.`},
    {t:"facts", title:{zh:"代表品种",en:"Notable varieties"},
     rows:[
       [{zh:"Puyat",en:"Puyat"},{zh:"种植与出口最广，肉厚奶油质地。",en:"Most planted/exported; thick, buttery flesh."}],
       [{zh:"Arancillo（ACC.1497）",en:"Arancillo (ACC.1497)"},{zh:"细腻绵滑、香气温和；与 Puyat 皆为本地 × Chanee 杂交。",en:"Creamy, mild aroma; both it and Puyat are native × Chanee hybrids."}],
       [{zh:"Duyaya / Oboza / GD-69",en:"Duyaya / Oboza / GD-69"},{zh:"Duyaya 意为“富贵榴莲”，果肉厚软。",en:"Duyaya means 'durian of riches' — thick, soft flesh."}],
       [{zh:"原生 D. graveolens",en:"Native D. graveolens"},{zh:"按肉色分 dugyan（红）、manakuka（橙）、luod（白）。",en:"By flesh colour: dugyan (red), manakuka (orange), luod (white)."}]
     ]},
    {t:"p",
     zh:`<strong>对华鲜果准入</strong>于 2022–23 年打开；策略聚焦达沃品牌、良好农业规范（GAP）与单体速冻（IQF）。达沃德奥罗曾发现<em class="term">无刺</em>突变株，但风味逊色。`,
     en:`<strong>Fresh access to China</strong> opened in 2022–23; the strategy centres on Davao branding, Good Agricultural Practices (GAP) and IQF freezing. <em class="term">Thornless</em> mutants exist in Davao de Oro but taste inferior.`},
    {t:"note", kind:"field",
     zh:`晚季窗口是菲律宾的结构性优势：其果实上市时，泰国与马来西亚的主季正接近尾声。`,
     en:`The late-season window is the Philippines' structural advantage: its fruit arrives as the Thai and Malaysian main seasons are ending.`}
  ]},

{ id:"china", num:"XXVI", lat:"Sina · Hainan", title:{zh:"中国（海南）",en:"China (Hainan)"}, sub:{zh:"由买家变为种植者",en:"the buyer becomes a grower"},
  blocks:[
    {t:"p",
     zh:`最大的买家开始自己种。商业化种植约始于 2018 年，集中在海南南部（三亚、乐东、保亭、陵水），云南、广西、广东也有试种。首个规模化收成在 2023 年（约 50 吨），2024 年约 200 吨，2025 年预计约 2000 吨，面积约 1 万亩（约 667 公顷）。`,
     en:`The biggest buyer has started to grow its own. Commercial planting began around 2018, concentrated in southern Hainan (Sanya, Ledong, Baoting, Lingshui), with trials in Yunnan, Guangxi and Guangdong. The first real harvest came in 2023 (~50 t), rising to ~200 t (2024) and a forecast ~2,000 t (2025), on about 10,000 mu (~667 ha).`},
    {t:"facts", title:{zh:"做法与重点",en:"Approach & focus"},
     rows:[
       [{zh:"引种品种",en:"Clones planted"},{zh:"金枕头、猫山王及 100 多个试验品种。",en:"Monthong, Musang King and 100+ trial varieties."}],
       [{zh:"智慧农业",en:"Smart farming"},{zh:"自动水肥、人工降雨、孢子/虫情实时监测。",en:"Automated fertigation, artificial rain, real-time spore/pest monitoring."}],
       [{zh:"育种方向",en:"Breeding aim"},{zh:"选育耐寒、耐旱品种以向北扩展。",en:"Cold- and drought-tolerant selections to push cultivation northward."}]
     ]},
    {t:"p",
     zh:`<strong>现实约束</strong>：树龄尚幼、台风风险、且只有海南最南端适宜 —— 国产榴莲目前是进口的<em class="term">补充</em>而非替代，价格仍高于进口果。`,
     en:`<strong>Reality check</strong>: young trees, typhoon exposure, and the fact that only the far south of Hainan is suitable mean domestic fruit is a <em class="term">supplement</em>, not a substitute, for imports — and prices stay above imported fruit for now.`},
    {t:"note", kind:"field",
     zh:`中国自身的农艺研发，加上它的 GACC 进口规则，正日益<strong>抬高整个地区必须达到的技术门槛</strong>。`,
     en:`China's own agronomy R&D, together with its GACC import rules, increasingly <strong>sets the technical bar the whole region must meet</strong>.`}
  ]},

{ id:"emerging", num:"XXVII", lat:"regiones novae", title:{zh:"新兴与精品产区",en:"Emerging & Boutique Growers"}, sub:{zh:"柬 · 缅 · 老 · 印度 · 斯里兰卡 · 澳 · 文莱",en:"Cambodia · Myanmar · Laos · India · Sri Lanka · Australia · Brunei"},
  blocks:[
    {t:"p",
     zh:`在几大产国之外，榴莲的种植沿着更宽的一道弧线展开 —— 有的历史悠久，有的刚刚起步，各自因季节与风土而独特。`,
     en:`Beyond the big producers, durian is grown along a wider arc — some long-established, some just starting, each distinctive for its season and terroir.`},
    {t:"cards",
     items:[
       {k:{zh:"柬埔寨",en:"Cambodia"},h:{zh:"贡布的名声",en:"Kampot's name"},p:{zh:"贡布/白马、磅湛（800+ 公顷）、马德望；本地种 Ang Siam、Nungoi、Laichee 与泰系品种并存，贡布榴莲享有盛誉。",en:"Kampot/Kep, Kampong Cham (800+ ha), Battambang; native Ang Siam, Nungoi, Laichee alongside Thai clones; Kampot fruit is prized."}},
       {k:{zh:"缅甸",en:"Myanmar"},h:{zh:"边境贸易",en:"Border trade"},p:{zh:"德林达依（丹老 Mergui）一带；经边境向中国与泰国供货。",en:"Tanintharyi (Mergui) region; supplies China and Thailand via border trade."}},
       {k:{zh:"老挝",en:"Laos"},h:{zh:"新兴",en:"Emerging"},p:{zh:"起步阶段，多有中资参与的新园。",en:"At an early stage, with China-linked investment in new orchards."}},
       {k:{zh:"印度",en:"India"},h:{zh:"南部小规模",en:"Small-scale south"},p:{zh:"喀拉拉、卡纳塔克、泰米尔纳德及东北部；多为实生、规模小。",en:"Kerala, Karnataka, Tamil Nadu and the northeast; mostly seedling, small-scale."}},
       {k:{zh:"斯里兰卡",en:"Sri Lanka"},h:{zh:"数百年历史",en:"Centuries-old"},p:{zh:"约 16 世纪引入；湿区与康提一带，主要本地消费。",en:"Introduced ~16th c.; wet zone and around Kandy; mainly local consumption."}},
       {k:{zh:"澳大利亚",en:"Australia"},h:{zh:"南半球错季",en:"Counter-season"},p:{zh:"北领地（达尔文 —— 全国最大果园）与昆士兰远北（丹翠/苦难角）；树上熟、常受气旋威胁，产季约 12–3 月。",en:"NT (Darwin — the country's largest orchard) and Far North QLD (Daintree/Cape Trib); tree-ripened, cyclone-prone, season ~Dec–Mar."}},
       {k:{zh:"文莱与婆罗洲",en:"Brunei & Borneo"},h:{zh:"野生森林种",en:"Wild forest durians"},p:{zh:"保有 D. graveolens、D. kutejensis 等野生种与深厚的本地食用文化。",en:"Retain wild species such as D. graveolens and D. kutejensis, and a deep local food culture."}},
       {k:{zh:"其他",en:"Others"},h:{zh:"零星产区",en:"Scattered"},p:{zh:"巴布亚新几内亚、马达加斯加、夏威夷与佛罗里达（多源自泰系品种）。",en:"Papua New Guinea, Madagascar, Hawai'i and Florida (largely from Thai cultivars)."}}
     ]},
    {t:"note", kind:"field",
     zh:`这些产区对<strong>全球供应日历</strong>意义重大：南半球与赤道产区的结果期错开大陆东南亚，填补了供应空档。`,
     en:`These origins matter for the <strong>global supply calendar</strong>: Southern-Hemisphere and equatorial pockets fruit off the mainland-SE-Asia cycle, filling supply gaps.`}
  ]},

{ id:"frontier", num:"XXVIII", lat:"limes · Africa · Americae", title:{zh:"全球前沿 · 非洲与美洲",en:"Global Frontier · Africa & the Americas"}, sub:{zh:"小规模 · 试验性 · 未入产量统计",en:"small-scale · experimental · off the FAO map"},
  blocks:[
    {t:"p",
     zh:`在亚洲与澳大利亚之外，榴莲还零星延伸到非洲与美洲 —— 那里确有活树，但都属精品或试验性质，<strong>并非商业化种植园，也未进入 FAO 产量统计</strong>。这一物种需要炎热湿润、无寒潮的极热带气候，且要 4–6 年才结果：能长，却难成规模。`,
     en:`Beyond Asia and Australia, durian reaches a scattered frontier in Africa and the Americas — real trees, but boutique or experimental, <strong>not commercial plantations, and absent from FAO production statistics</strong>. The species needs a hot, humid, ultra-tropical climate with no cold snaps, and 4–6 years to fruit: it can grow there, but rarely at scale.`},
    {t:"cards",
     items:[
       {k:{zh:"非洲",en:"Africa"},h:{zh:"桑给巴尔（坦桑尼亚）",en:"Zanzibar (Tanzania)"},p:{zh:"数百年前经贸易路线引入，至今仍有种植 —— 非洲最稳固、历史最久的一处小规模存在。",en:"Introduced centuries ago via trade routes and still grown today — Africa's most established, longest-standing small foothold."}},
       {k:{zh:"非洲",en:"Africa"},h:{zh:"马达加斯加与留尼汪",en:"Madagascar & Réunion"},p:{zh:"东海岸与低海拔有适宜气候；多为爱好者的嫁接与实生树，尚少商业挂果。",en:"Suitable pockets on the east coast and at low elevation; mostly enthusiast grafted and seedling trees, with little commercial fruiting yet."}},
       {k:{zh:"美洲",en:"Americas"},h:{zh:"哥斯达黎加",en:"Costa Rica"},p:{zh:"中美洲苗圃已嫁接繁育金枕头、差尼与 D24；属精品热带果园。",en:"Central American nurseries graft and grow Monthong, Chanee and D24; boutique tropical-fruit farms."}},
       {k:{zh:"美洲",en:"Americas"},h:{zh:"巴西 · 哥伦比亚 · 厄瓜多尔",en:"Brazil · Colombia · Ecuador"},p:{zh:"亚马逊热带区与研究收集圃中有零星植株，无商业种植园产业。",en:"Scattered trees in the Amazonian tropics and research collections; no commercial plantation industry."}},
       {k:{zh:"加勒比",en:"Caribbean"},h:{zh:"波多黎各",en:"Puerto Rico"},p:{zh:"曾有栽植，但多毁于风暴 —— 正说明飓风对该作物的制约。",en:"Trees were planted but most were lost to storms — a reminder of the hurricane constraint."}},
       {k:{zh:"展望",en:"Ambition"},h:{zh:"非洲出口设想",en:"African export idea"},p:{zh:"有与马来西亚合作、在非洲寻地种植猫山王出口的设想 —— 目前是愿景，尚未成产业。",en:"There is talk of partnering with Malaysia to source African land for export-grade Musang King — for now an ambition, not yet an industry."}}
     ]},
    {t:"note", kind:"field",
     zh:`为何长期边缘化：距中国主市场遥远、风暴/飓风风险、加上 4–6 年结果的时滞。气候上赤道非洲与拉美都能种榴莲，但<strong>经济与物流</strong>使其停留在“前沿”而非产业。`,
     en:`Why it stays marginal: distance from the main China market, storm/hurricane risk, and the 4–6 year lag to fruiting. Climate permits durian across equatorial Africa and Latin America, but <strong>economics and logistics</strong> keep it a frontier rather than an industry.`}
  ]},

{ id:"compare", num:"XXIX", lat:"comparatio", title:{zh:"各国实践对比",en:"Practices Compared"}, sub:{zh:"同一棵树，不同的打法",en:"one tree, different playbooks"},
  blocks:[
    {t:"p",
     zh:`同样是 <em class="term">Durio zibethinus</em>，各国的打法却不同。最鲜明的分野是<strong>采收哲学</strong>：`,
     en:`It is the same <em class="term">Durio zibethinus</em> everywhere, yet the playbooks differ. The sharpest divide is the <strong>harvest philosophy</strong>:`},
    {t:"table",
     head:[{zh:"维度",en:"Dimension"},{zh:"树上熟派",en:"Tree-ripened school"},{zh:"切果后熟派",en:"Cut-mature school"}],
     rows:[
       [{zh:"代表",en:"Representative"},{zh:"马来西亚、印尼、精品园",en:"Malaysia, Indonesia, boutique farms"},{zh:"泰国、越南（出口）",en:"Thailand, Vietnam (export)"}],
       [{zh:"如何采",en:"How harvested"},{zh:"待自然脱落、以网接住",en:"Left to abscise and fall, caught in nets"},{zh:"成熟仍硬时剪下（按天数＋干物质）",en:"Cut firm at maturity (by DAF + dry-matter)"}],
       [{zh:"质地与香气",en:"Texture & aroma"},{zh:"更软、更饱满、气味更强",en:"Softer, fuller, stronger aroma"},{zh:"更结实、更温和",en:"Firmer, milder"}],
       [{zh:"货架与物流",en:"Shelf & logistics"},{zh:"短 → 冷冻",en:"Short → freeze"},{zh:"长 → 鲜果冷链",en:"Longer → fresh cold-chain"}],
       [{zh:"输华形态",en:"Form to China"},{zh:"冷冻为主，2024 起加鲜果",en:"Mostly frozen; fresh added from 2024"},{zh:"鲜果＋冷冻",en:"Fresh + frozen"}]
     ]},
    {t:"p",
     zh:`其他差异轴：<strong>花期调控</strong> —— 泰国倚重多效唑＋旱胁迫做反季，多数产国靠自然旱期诱导；<strong>授粉</strong> —— 野外皆为蝙蝠传粉，但泰国普遍加做夜间人工授粉以提坐果、填满果室；<strong>季节</strong> —— 大陆东南亚多在年中，印尼 12–2 月，菲律宾 8–11 月，澳大利亚夏季（12–3 月）；<strong>准入规则</strong> —— GACC 的种植区与包装厂代码，如今是所有出口国进入中国市场的共同门槛。`,
     en:`Other axes: <strong>flowering control</strong> — Thailand leans on paclobutrazol plus dry-stress for off-season, while most others rely on natural dry-spell induction; <strong>pollination</strong> — bat-pollinated in the wild everywhere, but Thailand widely adds night hand-pollination for set and locule fill; <strong>season</strong> — mainland SE Asia mid-year, Indonesia Dec–Feb, Philippines Aug–Nov, Australia summer (Dec–Mar); <strong>access rules</strong> — GACC growing-area and packing codes now gate the China market for every exporter.`},
    {t:"facts", title:{zh:"各国主导品种速览",en:"Dominant clones at a glance"},
     rows:[
       [{zh:"泰国",en:"Thailand"},{zh:"金枕头 · 差尼 · 甘瑶",en:"Monthong · Chanee · Kan Yao"}],
       [{zh:"马来西亚",en:"Malaysia"},{zh:"猫山王 · 黑刺 · D24",en:"Musang King · Black Thorn · D24"}],
       [{zh:"越南",en:"Vietnam"},{zh:"Ri6 · Dona",en:"Ri6 · Dona"}],
       [{zh:"印度尼西亚",en:"Indonesia"},{zh:"Bawor · Montong · Matahari",en:"Bawor · Montong · Matahari"}],
       [{zh:"菲律宾",en:"Philippines"},{zh:"Puyat · Arancillo",en:"Puyat · Arancillo"}],
       [{zh:"中国·海南",en:"China · Hainan"},{zh:"金枕头 · 猫山王（引种）",en:"Monthong · Musang King (introduced)"}]
     ]},
    {t:"note", kind:"field",
     zh:`对种植者而言，结论很简单：<strong>品种选择、采收方式与花期策略，应当追随你的市场与冷链，而不是照搬别国的模式。</strong>`,
     en:`For a grower the lesson is simple: <strong>let clone choice, harvest method and induction strategy follow your market and cold-chain — not another country's model.</strong>`}
  ]},

{ id:"valuechain", lat:"filum valoris · industria", title:{zh:"榴莲产业链",en:"The Durian Value Chain"}, sub:{zh:"上游 · 中游 · 下游 · 循环经济",en:"upstream · midstream · downstream · circular"},
  blocks:[
    {t:"p",
     zh:`一颗榴莲的周围，是一整条产业链：上游的投入、农场本身、采后的中游，直到下游的市场，另有一条<strong>副产品分支</strong>与一层横跨全局的<strong>支撑层</strong>。市场拉力巨大——预计到 2030 年全球榴莲贸易将超过 <strong>250 亿美元</strong>，主要由中国驱动。`,
     en:`Around a single durian sits an entire industry — a chain running from upstream inputs, through the farm, to post-harvest midstream and the downstream market, with a <strong>byproducts branch</strong> and an <strong>enabling layer</strong> beneath it all. The market pull is large: global durian trade is projected to exceed <strong>US$25 billion by 2030</strong>, China-led.`},
    {t:"plate", svg:"valuechain", no:{zh:"图版 XVI",en:"PLATE XVI"},
     cap:{zh:"产业链：上游（农资）→ 农场 → 中游·采后（分级·冷冻·物流）→ 下游·市场；副产品自中游分出，支撑层（研发·认证·金融·数字/AI）贯穿始终。",
          en:"The value chain: upstream (inputs) → farm → midstream/post-harvest (grading, freezing, logistics) → downstream market; byproducts branch off midstream, with an enabling layer (R&D, certification, finance, digital/AI) throughout."}},
    {t:"cards",
     items:[
       {k:{zh:"上游",en:"Upstream"},h:{zh:"投入与服务",en:"Inputs & services"},p:{zh:"苗木与嫁接、肥料与生物农药、灌溉/机械/智慧农业、农艺顾问与土壤叶片检测、GAP 认证、农业金融与保险。",en:"Nurseries & grafting, fertilizers & biopesticides, irrigation/machinery/smart-farming, agronomy advice & soil-leaf testing, GAP certification, agri-finance & insurance."}},
       {k:{zh:"中游·采后",en:"Midstream"},h:{zh:"采后处理与物流",en:"Post-harvest & logistics"},p:{zh:"收购与包装厂、分级/分选（含 AI）、后熟管理、液氮/IQF 冷冻与冷库、MRL/植检/HACCP 服务、冷链运输与报关。",en:"Collectors & packhouses, grading/sorting (incl. AI), ripening, liquid-N/IQF freezing & cold storage, MRL/phyto/HACCP services, cold-chain logistics & customs."}},
       {k:{zh:"下游·市场",en:"Downstream"},h:{zh:"加工·渠道·消费",en:"Processing, trade, consumption"},p:{zh:"果浆/冻干/月饼/雪糕/咖啡/零食等加工，批发与进出口，商超·专卖·电商直播零售，餐饮，品牌与榴莲旅游。",en:"Processing (pulp, freeze-dried, mooncakes, ice cream, coffee, snacks), wholesale & import/export, supermarket/specialty/e-commerce-livestream retail, foodservice, branding & durian tourism."}},
       {k:{zh:"副产品·循环",en:"Byproducts"},h:{zh:"果壳与种子约占 60–70%",en:"Husk + seed ≈ 60–70%"},p:{zh:"果壳→炭砖·生物炭·活性炭·果胶·菌菇基质（商用）与纳米纤维素·可食膜·琥珀酸/乙醇/沼气（研究）；种子→淀粉粉·饲料；果肉余料→环保酵素·堆肥。",en:"Husk → charcoal, biochar, activated carbon, pectin, mushroom substrate (commercial) and nanocellulose, films, succinic/ethanol/biogas (research); seed → starch/flour, feed; pulp offcuts → eco-enzyme, compost."}},
       {k:{zh:"支撑层",en:"Enabling"},h:{zh:"贯穿全链",en:"Across the chain"},p:{zh:"研发与育种、标准与认证机构、海关与主管部门、大宗融资与保险，以及数字层：农场管理与天气预报应用、AI 分级、可追溯平台。",en:"R&D & breeding, standards & certification bodies, customs authorities, commodity finance, and the digital layer: farm-management & weather-forecast apps, AI grading, traceability platforms."}}
     ]},
    {t:"table",
     head:[{zh:"部位",en:"Part"},{zh:"产品",en:"Products"},{zh:"阶段",en:"Stage"}],
     rows:[
       [{zh:"果壳",en:"Husk"},{zh:"炭砖·生物炭·活性炭·果胶·菌菇基质·钾肥灰",en:"Charcoal, biochar, activated carbon, pectin, mushroom substrate, potash ash"},{zh:"商用/中试",en:"commercial/pilot"}],
       [{zh:"果壳",en:"Husk"},{zh:"纳米纤维素·可食/复合膜·生物吸附剂·琥珀酸·乙醇·沼气",en:"Nanocellulose, edible/composite films, biosorbents, succinic acid, ethanol, biogas"},{zh:"研究",en:"research"}],
       [{zh:"种子",en:"Seed"},{zh:"淀粉/种子粉·成膜配料·零食·动物饲料",en:"Starch/flour, film-forming ingredient, snacks, animal feed"},{zh:"商用/新兴",en:"commercial/emerging"}],
       [{zh:"果肉余料",en:"Pulp offcuts"},{zh:"环保酵素·堆肥·抗氧化提取物",en:"Eco-enzyme, compost, antioxidant extracts"},{zh:"商用/新兴",en:"commercial/emerging"}]
     ]},
    {t:"note", kind:"field",
     zh:`一座果园位于这条链的<strong>最上端</strong>。种植者或合作社若能多留住一些中游与副产品的价值——分级、冷冻、环保酵素、农旅、直销电商——就能少受地头价波动的冲击。<strong>越往下游走，议价力越强。</strong>`,
     en:`A durian farm sits at the <strong>head</strong> of this chain. The more of the midstream and byproduct value a grower or cooperative can keep — grading, freezing, eco-enzyme, agritourism, direct e-commerce — the less exposed they are to farm-gate price swings. <strong>The further downstream you reach, the more pricing power you hold.</strong>`}
  ]},

{ id:"sustainability", lat:"perpetuitas · resilientia", title:{zh:"可持续与气候韧性",en:"Sustainability & Resilience"}, sub:{zh:"蝙蝠授粉 · 气候 · 毁林悖论",en:"bat pollinators · climate · the deforestation paradox"},
  blocks:[
    {t:"p",
     zh:`榴莲热潮藏着一个悖论：为扩种榴莲，正砍掉它赖以结果的<strong>森林</strong>、丢失为它<strong>授粉的蝙蝠</strong>。长期产量的关键，在于让授粉者与气候站在你这边。`,
     en:`The durian boom carries a paradox: to expand durian, the very <strong>forests</strong> it needs and the <strong>bats that pollinate it</strong> are being lost. Long-term yield depends on keeping pollinators and climate on your side.`},
    {t:"plate", svg:"sustain", no:{zh:"图版 XXXVII",en:"PLATE XXXVII"},
     cap:{zh:"共命运的三角：森林为蝙蝠提供栖息，蝙蝠为榴莲授粉，榴莲的价值又本应激励护林。猎捕/扑杀、毁林与高温正同时削弱这条链。",
          en:"A shared-fate triangle: forest gives bats their roosts, bats pollinate durian, and durian's value should in turn reward protecting the forest. Hunting/culling, deforestation and heat are weakening all three links at once."}},
    {t:"facts", title:{zh:"三大压力",en:"Three pressures"},
     rows:[
       [{zh:"授粉者衰退",en:"Pollinator decline"},{zh:"榴莲主要靠<strong>果/蜜蝠</strong>（洞穴蜜蝠 Eonycteris spelaea、狐蝠）授粉，正因猎捕、误当害兽扑杀、石灰岩洞穴破坏与栖地丧失而锐减——蝙蝠少，坐果差。",en:"Durian's main pollinators are <strong>nectar/fruit bats</strong> (cave nectar bat Eonycteris spelaea, flying foxes), in sharp decline from hunting, culling as mistaken pests, limestone-cave destruction and habitat loss — fewer bats mean poorer fruit set."}],
       [{zh:"气候变化",en:"Climate change"},{zh:"反常天气与花期不时雨引起<strong>落花、坐果失败</strong>；热浪（>42°C）可致蝙蝠大规模死亡。",en:"Erratic weather and unseasonal rain at flowering cause <strong>flower drop and failed set</strong>; heat waves (>42 °C) can kill bats en masse."}],
       [{zh:"毁林悖论",en:"Deforestation paradox"},{zh:"为种榴莲砍林，恰恰毁掉维系授粉的<strong>蝙蝠栖息与森林</strong>——反噬产业自身。",en:"Clearing forest to plant durian removes the <strong>bat roosts and forest</strong> that sustain pollination — undermining the very industry it feeds."}]
     ]},
    {t:"p",
     zh:`<strong>怎么办</strong>：在果园周边<strong>保留/补植本土林与蝙蝠栖息地</strong>；<strong>不要张网驱赶</strong>授粉蝙蝠；减少广谱农药以护蝠护虫；<strong>混种花期互补的品种</strong>（如 Ri6、金枕头）促进异花授粉；并做菌根友好的土壤管理。护蝠不是慈善，而是<strong>产量保险</strong>。`,
     en:`<strong>What helps</strong>: protect or replant <strong>native forest patches and bat roosts</strong> near orchards; <strong>don't net out</strong> pollinating bats; cut broad-spectrum pesticide use to spare bats and insects; <strong>plant multiple cultivars with overlapping flowering</strong> (e.g. Ri6, Monthong) to aid cross-pollination; and keep soil care mycorrhiza-friendly. Conserving bats isn't charity — it's <strong>yield insurance</strong>.`},
    {t:"note", kind:"field",
     zh:`研究给出的最清晰一课：<strong>榴莲种植者与果蝠命运与共。</strong>让果园周边的蝙蝠与森林保持健康，是在一棵榴莲树数十年的寿命里，保护坐果最便宜、最持久的办法之一。`,
     en:`The clearest lesson from the research: <strong>durian growers and fruit bats share a fate.</strong> Keeping bats and forest healthy near orchards is one of the cheapest, most durable ways to protect fruit set across the many decades a durian tree lives.`}
  ]},

{ id:"heritage", lat:"historia · cultura", title:{zh:"历史与文化",en:"History & Culture"}, sub:{zh:"婆罗洲起源 · 果王 · 地理标志",en:"Bornean origin · the king of fruits · heritage"},
  blocks:[
    {t:"p",
     zh:`榴莲的故事，从婆罗洲的野生雨林一路走到今天数十亿美元的标志性水果。它的名字来自马来语 <em class="term">duri（刺）</em>；在东南亚被尊为<strong>“果王”</strong>。`,
     en:`Durian's story runs from wild Bornean rainforest to today's multibillion-dollar icon. Its name comes from the Malay <em class="term">duri</em> (thorn), and across Southeast Asia it is revered as the <strong>"king of fruits"</strong>.`},
    {t:"plate", svg:"timeline", no:{zh:"图版 XXXVIII",en:"PLATE XXXVIII"},
     cap:{zh:"足迹：婆罗洲与苏门答腊的野生起源 → 史前由原住民驯化 → Rumphius 于 1741 年详述并确立 Durio 属 → Wallace 于 1856 年留下名句 → 现代对华贸易热潮。",
          en:"The trail: wild origins in Borneo and Sumatra → prehistoric domestication by indigenous peoples → Rumphius describes it and establishes the genus Durio (1741) → Wallace's famous account (1856) → the modern China-driven boom."}},
    {t:"facts", title:{zh:"足迹",en:"Milestones"},
     rows:[
       [{zh:"起源",en:"Origin"},{zh:"野生于<strong>婆罗洲与苏门答腊</strong>雨林（约 30 个 Durio 物种多在此演化）；史前由达雅族、原住民等驯化。",en:"Wild in the rainforests of <strong>Borneo and Sumatra</strong> (where most of the ~30 Durio species evolved); domesticated in prehistory by peoples such as the Dayak and Orang Asli."}],
       [{zh:"命名",en:"Naming"},{zh:"欧洲旅人曾以多种拼法记录；德国植物学家 <strong>Rumphius《安汶植物志》(1741)</strong> 详加描述，并被誉为 Durio 属的确立者。",en:"European travellers recorded many spellings; the German botanist <strong>Rumphius, in Herbarium Amboinense (1741)</strong>, described it in detail and is credited with the genus Durio."}],
       [{zh:"名句",en:"Famous account"},{zh:"博物学家 <strong>Wallace（1856）</strong> 把果肉比作“加了杏仁的浓郁蛋奶冻”，并说越吃越停不下来。",en:"The naturalist <strong>Wallace (1856)</strong> likened the flesh to a rich, almond-flavoured custard, and remarked that the more one eats, the less one wishes to stop."}],
       [{zh:"传播",en:"Spread"},{zh:"经贸易者传遍马来群岛与东南亚大陆，见于文献已 <strong>400 多年</strong>。",en:"Carried by traders across the Malay Archipelago and mainland Southeast Asia, recorded for over <strong>400 years</strong>."}]
     ]},
    {t:"p",
     zh:`<strong>文化与传承</strong>：榴莲深植于节庆、民俗与社交，是丰盛与身份的象征；气味之烈，令许多酒店、航空与轨道交通<strong>明令禁带</strong>。如今这份传承被写入<strong>地理标志（GI）</strong>——马来西亚劳勿（Raub）猫山王、柬埔寨贡布榴莲、泰国多地 GI——以保护产地与高端身份。`,
     en:`<strong>Culture and heritage</strong>: durian is woven into festivals, folklore and social life — a symbol of abundance and status; its smell is so strong that many hotels, airlines and transit systems <strong>ban it outright</strong>. That heritage is now formalised in <strong>geographical indications</strong> — Musang King's Raub GI in Malaysia, Kampot durian in Cambodia, and Thai regional GIs — protecting origin and premium identity.`},
    {t:"note", kind:"field",
     zh:`当全球需求把产业推向商业单一栽培，植物学家提醒：婆罗洲那些<strong>野生近缘种与冷门地方品种</strong>——更小、更苦、遗传多样——是这一作物未来不可替代的基因宝库。传承不只关乎文化，也关乎<strong>基因</strong>。`,
     en:`As global demand pushes toward commercial monoculture, botanists warn that Borneo's <strong>wild relatives and obscure local cultivars</strong> — smaller, more bitter, genetically diverse — are an irreplaceable reservoir for the crop's future. Heritage is not only cultural; it is <strong>genetic</strong>.`}
  ]}
];

// collect every string value in a section (both languages) into one lower-cased blob for search
function deepText(o){

  if(typeof o==="string") return o+" ";
  if(Array.isArray(o)) return o.map(deepText).join("");
  if(typeof o==="object") return Object.values(o).map(deepText).join("");
  return "";
}

function renderFacts(b){
  const rows = b.rows.map(([dt,dd])=>`<dt>${t(dt)}</dt><dd>${t(dd)}</dd>`).join("");
  return `<div class="facts"><div class="facts__t">${t(b.title)}</div><dl>${rows}</dl></div>`;
}
function renderPlate(b){
  return `<figure class="plate reveal"><div class="plate__frame">${PLATES[b.svg]||""}</div>
    <figcaption class="plate__cap"><span class="plate__no">${t(b.no)}</span><span class="plate__txt">${t(b.cap)}</span></figcaption></figure>`;
}
function renderNote(b){
  const k = b.kind==="care" ? (L==="zh"?"注意":"CAUTION") : (L==="zh"?"田间要点":"FIELD NOTE");
  return `<div class="note note--${b.kind==="care"?"care":"field"}"><span class="note__k">${k}</span>${t(b)}</div>`;
}
function renderCards(b){
  const cards = b.items.map(it=>`<div class="minicard"><div class="k">${t(it.k)}</div><h4>${t(it.h)}</h4><p>${t(it.p)}</p></div>`).join("");
  return `<div class="grid-facts" style="margin:24px 0">${cards}</div>`;
}
function renderTable(b){
  const heads = b.head.map(h=>t(h));
  const head = heads.map(h=>`<th>${h}</th>`).join("");
  const rows = b.rows.map(r=>{
    const cells = r.map((c,i)=>{
      const lbl = esc(heads[i]||"");
      // plain strings render as monospace "data/code" cells; objects are bilingual
      if(typeof c === "string") return `<td class="cvcode" data-label="${lbl}">${esc(c)}</td>`;
      return `<td data-label="${lbl}">${t(c)}</td>`;
    }).join("");
    return `<tr>${cells}</tr>`;
  }).join("");
  return `<div class="cvwrap"><table class="cvtable"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
}
function renderBlock(b){
  switch(b.t){
    case "p": return `<p>${t(b)}</p>`;
    case "facts": return renderFacts(b);
    case "plate": return renderPlate(b);
    case "note": return renderNote(b);
    case "cards": return renderCards(b);
    case "table": return renderTable(b);
    default: return "";
  }
}
function renderSection(s, i){
  // group leading/trailing prose into .prose wrappers, keep plates/tables full-width
  let html = "";
  let proseBuf = [];
  const flush = ()=>{ if(proseBuf.length){ html += `<div class="prose reveal">${proseBuf.join("")}</div>`; proseBuf=[]; } };
  s.blocks.forEach(b=>{
    if(b.t==="p" || b.t==="facts" || b.t==="note"){ proseBuf.push(renderBlock(b)); }
    else { flush(); html += renderBlock(b); }
  });
  flush();
  return `<section class="section" id="${s.id}">
    <header class="section__head reveal">
      <div class="eyebrow"><span class="num">${toRoman(i+1)}</span><span class="rule"></span><span class="lat">${s.lat}</span></div>
      <h2>${t(s.title)}</h2>
      <div class="section__sub">${t(s.sub)}</div>
    </header>${html}</section>`;
}

function currentSectionId(){

  return id;
}

  function updateMagContent(){

    magBar.addEventListener("pointermove", (e)=>{
      if(!magDrag) return;
      Lx = Math.min(Math.max(0, mLx0 + (e.clientX - mSX)), Math.max(0, window.innerWidth - Lw));
      Ly = Math.min(Math.max(0, mLy0 + (e.clientY - mSY)), Math.max(0, window.innerHeight - Lh));
      positionLens(); scheduleMag(); e.preventDefault();
    });
    magBar.addEventListener("pointerup", (e)=>{ magDrag=false; try{ magBar.releasePointerCapture(e.pointerId); }catch(_){} });
    magBar.addEventListener("pointercancel", ()=>{ magDrag=false; });
  }
  if(magResize){                               // drag the corner to resize; text re-wraps to the new width
    let rz=false, rSX=0, rSY=0, rLw0=0, rLh0=0;
    magResize.addEventListener("pointerdown", (e)=>{
      rz=true; rSX=e.clientX; rSY=e.clientY; rLw0=Lw; rLh0=Lh;
      try{ magResize.setPointerCapture(e.pointerId); }catch(_){}
      e.preventDefault(); e.stopPropagation();
    });
    magResize.addEventListener("pointermove", (e)=>{
      if(!rz) return;
      Lw = Math.min(Math.max(220, rLw0 + (e.clientX - rSX)), window.innerWidth - Lx - 6);
      Lh = Math.min(Math.max(MAGBAR + 90, rLh0 + (e.clientY - rSY)), window.innerHeight - Ly - 6);
      positionLens(); reflowResize();
      e.preventDefault(); e.stopPropagation();
    });
    magResize.addEventListener("pointerup", (e)=>{ rz=false; try{ magResize.releasePointerCapture(e.pointerId); }catch(_){} });
    magResize.addEventListener("pointercancel", ()=>{ rz=false; });
  }
  if(window.__magScroll){ window.removeEventListener("scroll", window.__magScroll); window.removeEventListener("resize", window.__magResize); }
  window.__magScroll = ()=>{ if(magActive) scheduleMag(); };
  window.__magResize = ()=>{ if(magActive){ Lw=Math.min(window.innerWidth-16,560); Lx=Math.min(Lx,Math.max(0,window.innerWidth-Lw)); Ly=Math.min(Ly,Math.max(0,window.innerHeight-Lh)); positionLens(); magKey=""; updateMagContent(); } };
  window.addEventListener("scroll", window.__magScroll, {passive:true});
  window.addEventListener("resize", window.__magResize);

  // Esc closes the top-most overlay (managed so it doesn't stack across re-renders)
  if(window.__escHandler) document.removeEventListener("keydown", window.__escHandler);
  window.__escHandler = (e)=>{
    if(e.key !== "Escape") return;
    if(noteDlg && !noteDlg.hidden){ closeAddNote(); return; }
    if(bmPanel && !bmPanel.hidden){ closeBm(); return; }
    if(magActive){ magClose(); return; }
  };
  document.addEventListener("keydown", window.__escHandler);
}

  wire();
}

function isStandalone(){ return matchMedia("(display-mode:standalone)").matches || window.navigator.standalone===true; }
window.addEventListener("beforeinstallprompt", (e)=>{ e.preventDefault(); deferredPrompt=e;
  const ib=document.getElementById("installBtn"); if(ib){ ib.hidden=false; ib.onclick=async()=>{ deferredPrompt.prompt(); deferredPrompt=null; ib.hidden=true; }; } });

    const manifest = {

/* ---- PWA: service worker + "update available" toast ---- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    let waiting = null, doReload = false;
    const showUpdateToast = () => {
      if (document.getElementById("updToast") || !document.body || !waiting) return;
      const zh = L === "zh";
      const bar = document.createElement("div");
      bar.className = "updtoast"; bar.id = "updToast"; bar.setAttribute("role", "status");
      bar.innerHTML =
        '<svg class="updtoast__ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v5h-5"/></svg>' +
        '<span>' + (zh ? "有新版本 · 点击刷新" : "Update available — tap to refresh") + '</span>' +
        '<button class="updtoast__x" type="button" aria-label="' + (zh ? "忽略" : "Dismiss") + '">✕</button>';
      bar.querySelector(".updtoast__x").addEventListener("click", (e) => { e.stopPropagation(); bar.remove(); });
      bar.addEventListener("click", () => { if (waiting) { doReload = true; waiting.postMessage("skipWaiting"); } bar.remove(); });
      document.body.appendChild(bar);
    };
    navigator.serviceWorker.register("sw.js").then((reg) => {
      if (reg.waiting && navigator.serviceWorker.controller) { waiting = reg.waiting; showUpdateToast(); }
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) { waiting = nw; showUpdateToast(); }
        });
      });
    }).catch(() => {});
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (doReload) { doReload = false; window.location.reload(); }   // reload only after the user taps
    });
  });
}
