<!DOCTYPE html>
<html lang="zh" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FCFBF7">
<title>榴莲树科学 · Durian Tree Science</title>
<meta name="description" content="榴莲树的植物学与生理学完整图解手册 · A complete illustrated handbook of durian tree botany and physiology">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="榴莲树科学">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
:root{
  --bg:#FCFBF7;            /* page – warm white */
  --surface:#FFFFFF;       /* chrome & cards */
  --surface-2:#F5F1E8;     /* tinted panel */
  --line:#E6E1D3;          /* borders */
  --line-soft:#EFEBDE;
  --green:#2F6032;         /* leaf-green accent */
  --green-deep:#22461F;    /* dark green – headings/chrome text */
  --bronze:#985718;        /* copper accent (deepened for light bg) */
  --bronze-deep:#7A4413;
  --gold:#BE851C;          /* deep gold – small accents */
  --aril:#EBBB4C;          /* highlight gold (fills / underline) */
  --ink:#1D2317;           /* near-black body text */
  --ink-soft:#4A5341;
  --ink-faint:#6F7865;
  /* legacy aliases kept so any stray references still resolve */
  --husk:var(--green-deep); --husk-2:#2C5330; --husk-line:var(--line);
  --paper:var(--bg); --paper-2:var(--surface-2); --paper-edge:var(--line);
  --bronze-soft:#B0763A; --aril-deep:#D19A2A; --thorn:#6B7A5E; --ink-faint2:#75816B;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Songti SC",Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","PingFang SC","Microsoft YaHei",Roboto,sans-serif;
  --mono:"SF Mono",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace;
  --measure:66ch;
  --pad:clamp(18px,5vw,40px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:var(--bg);
  font-size:17px;
  line-height:1.72;
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
:lang(zh){font-family:var(--sans)}
.lat{font-family:var(--serif);font-style:italic}

/* ---------- MASTHEAD ---------- */
.mast{
  position:sticky;top:0;z-index:50;
  background:var(--surface);
  color:var(--ink);
  border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top);
}
.mast__row{display:flex;align-items:center;gap:14px;padding:11px var(--pad);max-width:1180px;margin:0 auto}
.mark{display:flex;align-items:center;gap:11px;min-width:0;background:transparent;border:0;padding:3px;margin:-3px;font:inherit;text-align:left;cursor:pointer;border-radius:7px;-webkit-tap-highlight-color:transparent;transition:opacity .16s}
.mark:hover{opacity:.72}
.mark:active{opacity:.55}
.mark:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.mark svg{transition:transform .18s}
.mark:hover svg{transform:rotate(-8deg)}
.mark svg{width:30px;height:30px;flex:none}
.mark__txt{min-width:0}
.mark__zh{font-weight:700;font-size:17px;letter-spacing:.3px;line-height:1.1;color:var(--green-deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mark__en{font-family:var(--mono);font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--bronze);white-space:nowrap}
.mast__spacer{flex:1}
.toolbtn{
  font-family:var(--mono);font-size:11.5px;letter-spacing:1px;font-weight:600;
  background:var(--surface);color:var(--green-deep);
  border:1px solid var(--line);border-radius:5px;
  padding:8px 12px;cursor:pointer;white-space:nowrap;
  transition:background .18s,border-color .18s,color .18s;
}
.toolbtn:hover{background:var(--surface-2);border-color:var(--bronze);color:var(--bronze-deep)}
.toolbtn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.toolbtn--idx{display:inline-flex;align-items:center;justify-content:center;height:38px;border-radius:20px;min-width:90px;padding:0 18px;text-align:center;font-size:12px;letter-spacing:1px;text-indent:1px}
:lang(zh) .toolbtn--idx{font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:3px;text-indent:3px}
:lang(zh) .langtoggle__lbl{font-family:var(--sans);font-size:14.5px;font-weight:700}
.langtoggle{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:38px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.5px;
  background:var(--green);color:#fff;border:1px solid var(--green);border-radius:20px;padding:0 13px 0 11px;cursor:pointer;white-space:nowrap;
  transition:background .16s,border-color .16s,opacity .16s}
.langtoggle:hover{background:var(--green-deep);border-color:var(--green-deep)}
.langtoggle:active{transform:translateY(1px)}
.langtoggle:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.langtoggle__ic{width:16px;height:16px;flex:none;display:block}
.langtoggle__lbl{min-width:16px;text-align:center}

/* ---------- CHAPTER BAR (primary nav) ---------- */
.navbar{position:sticky;top:calc(54px + env(safe-area-inset-top));z-index:40;
  background:rgba(252,251,247,.95);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.nav-prog{position:absolute;left:0;top:-1px;height:2px;width:0;background:linear-gradient(90deg,var(--bronze),var(--green));border-radius:0 2px 2px 0;transition:width .12s linear}
.navbar__inner{display:flex;align-items:center;gap:10px;padding:7px var(--pad);max-width:1180px;margin:0 auto}
.nav-now{flex:1;min-width:0;display:flex;align-items:center;gap:11px;background:transparent;border:0;cursor:pointer;text-align:left;padding:5px 2px;color:var(--ink);border-radius:7px}
.nav-now__no{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.5px;color:#fff;background:var(--green);
  min-width:36px;height:23px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;flex:none;padding:0 7px}
.nav-now__t{min-width:0;font-weight:700;font-size:15px;color:var(--green-deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-now__caret{font-family:var(--mono);color:var(--bronze);font-size:13px;flex:none;opacity:.85}
.nav-now:hover .nav-now__t{color:var(--bronze-deep)}
.nav-now:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.nav-arrows{display:flex;gap:6px;flex:none}
.nav-arrow{width:34px;height:34px;border:1px solid var(--line);background:var(--surface);border-radius:8px;cursor:pointer;color:var(--ink-soft);
  display:inline-flex;align-items:center;justify-content:center;font-size:15px;line-height:1;transition:background .16s,border-color .16s,color .16s}
.nav-arrow:hover{background:var(--surface-2);border-color:var(--bronze);color:var(--bronze-deep)}
.nav-arrow:active{transform:translateY(1px)}
.nav-arrow:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.nav-arrow[disabled]{opacity:.3;cursor:default;pointer-events:none}

/* ---------- HERO ---------- */
.hero{
  background:linear-gradient(180deg,#EFF3E9 0%,#F4F5EC 100%);
  color:var(--ink);position:relative;overflow:hidden;
  border-bottom:1px solid var(--line);
  padding:clamp(34px,8vw,74px) var(--pad) clamp(30px,6vw,60px);
}
.hero__grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(24px,5vw,60px);align-items:center}
.hero__ey{font-family:var(--mono);font-size:11px;letter-spacing:3.5px;text-transform:uppercase;color:var(--bronze);font-weight:600;margin-bottom:18px}
.hero__ey::before{content:"";display:inline-block;width:24px;height:2px;background:var(--bronze);vertical-align:middle;margin-right:12px;transform:translateY(-4px)}
.hero h1{font-weight:800;line-height:1.06;letter-spacing:-.2px;font-size:clamp(34px,7.5vw,66px);color:var(--green-deep)}
.hero h1 .amp{color:var(--bronze);font-weight:600}
.hero__lat{font-family:var(--serif);font-style:italic;font-size:clamp(16px,2.6vw,21px);color:var(--bronze-deep);margin-top:12px;letter-spacing:.2px}
.hero__lat span{font-style:normal;font-family:var(--mono);font-size:.6em;letter-spacing:2px;color:var(--ink-faint);margin-left:10px;text-transform:uppercase}
.hero__lede{max-width:52ch;margin-top:20px;color:var(--ink-soft);font-size:clamp(15.5px,2vw,17px);line-height:1.72}
.hero__meta{margin-top:24px;display:flex;flex-wrap:wrap;gap:10px 26px}
.hero__meta div{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--ink-faint)}
.hero__meta b{display:block;font-weight:700;font-size:20px;color:var(--green);letter-spacing:0;margin-top:2px}
.hero__plate{align-self:center}
.hero__plate svg{width:100%;height:auto;max-height:360px;display:block;filter:drop-shadow(0 6px 18px rgba(34,70,31,.14))}

/* ---------- SECTIONS ---------- */
main{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 var(--pad)}
.section{padding:clamp(42px,8vw,80px) 0;border-bottom:1px solid var(--line);scroll-margin-top:calc(104px + env(safe-area-inset-top))}
.section:last-child{border-bottom:0}
.section__head{margin-bottom:28px}
.eyebrow{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
.eyebrow .num{font-family:var(--mono);font-size:12px;letter-spacing:2px;color:var(--bronze);font-weight:700}
.eyebrow .rule{flex:1;height:2px;background:linear-gradient(90deg,var(--bronze) 0,var(--line) 100%);opacity:.7}
.eyebrow .lat{font-size:14px;color:var(--ink-faint)}
.section h2{font-weight:800;font-size:clamp(25px,5vw,40px);line-height:1.14;letter-spacing:-.2px;color:var(--green-deep)}
.section__sub{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--bronze);margin-top:9px;font-weight:600}

.prose{max-width:var(--measure)}
.prose p{margin:0 0 17px;font-size:clamp(16px,2vw,17px);line-height:1.75}
.prose p:last-child{margin-bottom:0}
.prose strong{color:var(--green-deep);font-weight:700}
.prose em.term{font-style:normal;background:linear-gradient(transparent 60%,rgba(235,187,76,.5) 60%);padding:0 1px;font-weight:600;color:var(--green-deep)}
.prose .lat{color:var(--bronze-deep)}

/* callout facts */
.facts{margin:26px 0;border:1px solid var(--line);border-left:3px solid var(--bronze);background:var(--surface-2);border-radius:6px;overflow:hidden}
.facts__t{font-family:var(--mono);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--bronze-deep);font-weight:600;padding:12px 18px 0}
.facts dl{display:grid;grid-template-columns:auto 1fr;gap:0;padding:10px 18px 16px}
.facts dt{font-family:var(--mono);font-size:13px;letter-spacing:.2px;color:var(--ink-soft);font-weight:600;padding:8px 16px 8px 0;border-bottom:1px dotted var(--line);white-space:nowrap}
.facts dd{font-size:15px;color:var(--ink);padding:8px 0;border-bottom:1px dotted var(--line);text-align:right;font-weight:500}
.facts dt:last-of-type,.facts dd:last-of-type{border-bottom:0}
:lang(zh) .facts dt{font-family:var(--sans);letter-spacing:.4px}
:lang(zh) .facts__t,:lang(zh) .section__sub,:lang(zh) .note__k{letter-spacing:1px}

/* note / field / caution */
.note{margin:22px 0;padding:15px 18px;border-radius:6px;font-size:14.5px;line-height:1.62}
.note--field{background:rgba(152,87,24,.08);border:1px solid rgba(152,87,24,.28)}
.note--care{background:rgba(188,60,42,.07);border:1px solid rgba(188,60,42,.26)}
.note__k{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--bronze-deep);font-weight:700;display:block;margin-bottom:5px}
.note--care .note__k{color:#B23A2A}

/* ---------- PLATE ---------- */
.plate{margin:30px 0;background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.plate__frame{padding:clamp(14px,3vw,26px);background:repeating-linear-gradient(45deg,transparent 0 11px,rgba(152,87,24,.028) 11px 12px);border-bottom:1px solid var(--line)}
.plate svg{width:100%;height:auto;display:block;max-height:440px;margin:0 auto}
.plate__cap{display:flex;gap:12px;align-items:baseline;padding:13px 18px}
.plate__no{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--bronze);font-weight:700;white-space:nowrap;text-transform:uppercase}
.plate__txt{font-size:14px;color:var(--ink-soft);line-height:1.55}

.two{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.grid-facts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.minicard{background:var(--surface);border:1px solid var(--line);border-top:3px solid var(--bronze);border-radius:6px;padding:15px 16px}
.minicard h4{font-weight:700;font-size:16.5px;color:var(--green-deep);margin-bottom:5px}
.minicard .k{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--bronze);font-weight:600;margin-bottom:7px}
.minicard p{font-size:14px;color:var(--ink-soft);line-height:1.58;margin:0}

/* table */
.cvwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cvtable{width:100%;border-collapse:collapse;margin:22px 0;font-size:14px}
.cvtable th{font-family:var(--mono);font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--bronze-deep);font-weight:700;text-align:left;padding:10px 12px;border-bottom:2px solid var(--bronze);background:var(--surface-2)}
.cvtable td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.cvtable td:first-child{font-weight:700;color:var(--green-deep);white-space:nowrap}
.cvtable tr:last-child td{border-bottom:0}
.cvcode{font-family:var(--mono);font-size:13px;color:var(--bronze-deep);letter-spacing:.3px;font-weight:600}

/* ---------- FOOTER ---------- */
footer{background:var(--surface-2);color:var(--ink-soft);padding:clamp(34px,6vw,56px) var(--pad);position:relative;z-index:1;border-top:1px solid var(--line)}
.foot{max-width:1180px;margin:0 auto}
.foot__mark{font-weight:800;font-size:20px;color:var(--green-deep);margin-bottom:8px}
.foot__lat{font-family:var(--serif);font-style:italic;color:var(--bronze-deep);font-size:14.5px;margin-bottom:20px}
.foot p{font-size:13.5px;line-height:1.72;max-width:64ch;margin-bottom:12px;color:var(--ink-soft)}
.foot__src{font-family:var(--mono);font-size:11px;letter-spacing:.4px;color:var(--ink-faint);line-height:1.9;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}
.foot__meta{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--ink-faint);margin-top:18px;text-transform:uppercase}

/* reveal */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--green-deep);color:#fff;font-size:13.5px;padding:12px 18px;border-radius:8px;
  box-shadow:0 8px 26px rgba(34,70,31,.28);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:80;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* responsive */
@media (max-width:820px){
  .hero__grid{grid-template-columns:1fr;gap:28px}
  .hero__plate{order:-1;max-width:300px}
  .two{grid-template-columns:1fr}
  .grid-facts{grid-template-columns:1fr}
  .mark__en{display:none}
}
@media (max-width:520px){
  body{font-size:16.5px}
  .mark__zh{font-size:15.5px}
  .facts dl{grid-template-columns:1fr}
  .facts dt{border-bottom:0;padding-bottom:2px;font-size:13.5px}
  .facts dd{text-align:left;padding-top:2px;padding-bottom:12px;font-size:16px}
}
/* ---- mobile: stack tables into labelled cards (bigger, less white space) ---- */
@media (max-width:600px){
  .cvwrap{overflow-x:visible}
  .cvtable{font-size:15px;margin:20px 0}
  .cvtable,.cvtable tbody,.cvtable tr,.cvtable td{display:block;width:100%}
  .cvtable thead{display:none}
  .cvtable tr{background:var(--surface-2);border:1px solid var(--line);border-left:3px solid var(--bronze);border-radius:10px;padding:5px 15px;margin:0 0 12px}
  .cvtable td{padding:9px 0;border-bottom:1px dotted var(--line)!important;white-space:normal!important;vertical-align:top;line-height:1.5}
  .cvtable tr td:last-child{border-bottom:0!important}
  .cvtable td::before{content:attr(data-label);display:block;font-family:var(--mono);font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--bronze);font-weight:700;margin-bottom:4px}
  .cvtable td:first-child{color:var(--green-deep);font-weight:700;font-size:16px;white-space:normal!important;padding-top:11px}
  .cvtable td:first-child::before{font-size:11px;opacity:.75;margin-bottom:2px}
  .cvtable td.cvcode{font-size:14.5px}
}
[hidden]{display:none!important}
/* ---- Contents overlay ---- */
.idx{position:fixed;inset:0;z-index:200;display:flex;justify-content:center;align-items:flex-start}
.idx[hidden]{display:none}
.idx__backdrop{position:absolute;inset:0;background:rgba(29,35,23,.5);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.idx__panel{position:relative;z-index:1;width:min(680px,100%);height:100dvh;max-height:100dvh;background:var(--bg);display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.28)}
@media(min-width:720px){.idx{align-items:center;padding:24px}.idx__panel{height:auto;max-height:86vh;border:1px solid var(--line);border-radius:10px}}
.idx__head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px var(--pad);background:var(--surface);color:var(--green-deep);border-bottom:1px solid var(--line)}
.idx__title{font-weight:800;font-size:18px;display:flex;align-items:baseline;gap:10px}
.idx__count{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--bronze);text-transform:uppercase;font-weight:600}
.idx__x{appearance:none;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);width:34px;height:34px;border-radius:6px;font-size:13px;cursor:pointer;line-height:1}
.idx__x:hover{border-color:var(--bronze);background:var(--surface-2);color:var(--bronze-deep)}
.idx__x:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.idx__search{margin:14px var(--pad) 2px;padding:13px 15px;font-family:var(--sans);font-size:16px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:8px;outline:none}
.idx__search:focus{border-color:var(--green);background:#fff}
.idx__body{overflow-y:auto;padding:6px var(--pad) calc(24px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.idx__group{margin-top:14px}
.idx__glabel{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--bronze);font-weight:700;padding:6px 0;border-bottom:1px solid var(--line);margin-bottom:4px}
.idx__item{display:flex;gap:12px;align-items:baseline;width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid var(--line);padding:12px 4px;cursor:pointer;color:var(--ink)}
.idx__item:hover{background:var(--surface-2)}
.idx__item:focus-visible{outline:2px solid var(--green);outline-offset:-2px}
.idx__no{font-family:var(--mono);font-size:11px;color:var(--bronze);min-width:42px;letter-spacing:.4px;font-weight:600}
.idx__txt{display:flex;flex-direction:column;gap:2px}
.idx__t{font-weight:700;font-size:16px;line-height:1.25;color:var(--green-deep)}
.idx__s{font-size:12.5px;color:var(--ink-faint);line-height:1.3}
.idx__empty{padding:28px var(--pad);color:var(--ink-soft);font-size:14.5px;text-align:center}
.idx__repo{display:flex;flex-direction:column;align-items:center;gap:10px;margin:10px auto 6px;padding:22px 16px 6px;border-top:1px solid var(--line);text-decoration:none;text-align:center}
.idx__qr{display:block;width:154px;height:154px;padding:10px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 12px rgba(34,70,31,.08)}
.idx__qrimg{display:block;width:100%;height:100%}

    {t:"p",
     zh:`栽培榴莲的学名是 <span class="lat">Durio zibethinus</span>，属于<em class="term">锦葵科（Malvaceae）</em>——早期分类曾将它单独归入木棉科（Bombacaceae），现多作为锦葵科下的一个类群。属名 <span class="lat">Durio</span> 源自马来语 <em class="term">duri</em>（刺），种加词 <span class="lat">zibethinus</span> 则取自麝香猫（civet），暗指其浓烈的气味。`,
     en:`The cultivated durian is <span class="lat">Durio zibethinus</span>, a member of the <em class="term">Malvaceae</em> (the mallow family); older schemes placed it in Bombacaceae, now treated within Malvaceae. The genus name <span class="lat">Durio</span> comes from Malay <em class="term">duri</em> ("thorn"), and the epithet <span class="lat">zibethinus</span> refers to the civet, an allusion to the fruit's powerful aroma.`},
    {t:"p",
     zh:`<span class="lat">Durio</span> 属约有 30 个物种，其中约 9 种结可食果实（如 <span class="lat">D. graveolens</span>、<span class="lat">D. kutejensis</span>、<span class="lat">D. dulcis</span> 等），但商业栽培几乎全部集中在 <span class="lat">D. zibethinus</span>。它原生于<strong>婆罗洲与苏门答腊的湿润热带雨林</strong>，是东南亚低地雨林的高大乔木，后经人类选育与传播遍及马来西亚、泰国、印尼与菲律宾等地。`,
     en:`The genus contains roughly 30 species, of which about nine bear edible fruit (e.g. <span class="lat">D. graveolens</span>, <span class="lat">D. kutejensis</span>, <span class="lat">D. dulcis</span>), yet commercial cultivation is almost entirely <span class="lat">D. zibethinus</span>. It is native to the <strong>humid rainforests of Borneo and Sumatra</strong>, a tall canopy tree of Southeast Asian lowland forest, later selected and spread by people across Malaysia, Thailand, Indonesia and the Philippines.`},
    {t:"plate", svg:"genus", no:{zh:"图版 I",en:"PLATE I"},
     cap:{zh:"Durio 属约 30 种、约 9 种可食：栽培独尊 D. zibethinus（奶油黄果肉），近缘种如红橙肉、带杏仁香的 D. graveolens，橙肉味淡的 D. kutejensis，红壳焦糖味的 D. dulcis，以及野生的 D. oxleyanus。",
          en:"The genus Durio has ~30 species, ~9 edible: cultivation centres almost solely on D. zibethinus (custard-gold flesh), with relatives such as the red-orange, almond-scented D. graveolens, the milder orange-fleshed D. kutejensis, the red-husked, caramel D. dulcis, and the wild D. oxleyanus."}},
    {t:"facts", title:{zh:"分类速览",en:"Classification at a glance"}, rows:[
      [{zh:"界 / 门",en:"Kingdom / Div."},{zh:"植物界 · 被子植物",en:"Plantae · Angiosperms"}],
      [{zh:"目",en:"Order"},{zh:"锦葵目 Malvales",en:"Malvales"}],
      [{zh:"科",en:"Family"},{zh:"锦葵科 Malvaceae",en:"Malvaceae"}],
      [{zh:"属",en:"Genus"},{zh:"Durio",en:"Durio"}],
      [{zh:"栽培种",en:"Cultivated sp."},{zh:"D. zibethinus",en:"D. zibethinus"}],
      [{zh:"染色体数",en:"Chromosomes"},{zh:"常报 2n = 56",en:"commonly 2n = 56"}]
    ]},
    {t:"note", kind:"field",
     zh:`并非所有“榴莲”都是同一个物种。市场上偶见的红肉、橙肉野生榴莲多为 <span class="lat">D. graveolens</span> 等近缘种，风味与栽培品种差异明显。`,
     en:`Not every "durian" is the same species. The red- or orange-fleshed wild durians occasionally seen in markets are usually relatives such as <span class="lat">D. graveolens</span>, distinct in flavour from cultivated clones.`}
  ]},

{ id:"habit", num:"II", lat:"arbor · habitus", title:{zh:"树体形态与建成",en:"Tree Form & Architecture"}, sub:{zh:"常绿乔木 · 节律性抽梢",en:"Evergreen tree · rhythmic growth"},
  blocks:[
    {t:"p",
     zh:`榴莲是<em class="term">常绿乔木</em>。在原始林中可高达 <strong>25–50 米</strong>，果园栽培则常通过修剪控制在 <strong>8–15 米</strong>以便管理与采收。幼树树冠较呈<em class="term">塔形（金字塔状）</em>，主干直立，侧枝近水平轮生，形成层层向上的“烛台状”骨架；成年后树冠变得不规则而浓密。`,
     en:`The durian is an <em class="term">evergreen tree</em>. In primary forest it reaches <strong>25–50 m</strong>; in orchards it is usually pruned to <strong>8–15 m</strong> for management and harvest. Young trees are <em class="term">pyramidal</em>, with an upright leader and near-horizontal, whorled branches forming a tiered "candelabra" frame; with age the crown becomes irregular and dense.`},
    {t:"p",
     zh:`老树主干基部常发育出<em class="term">板根（buttress roots）</em>——雨林高树支撑冠层、稳固浅根系的典型结构。树皮红棕色，成片状剥落。生长呈<strong>节律性抽梢</strong>：不是连续伸长，而是一波一波地抽出新梢（flush），新叶初展时常带古铜或淡红色，随后转深绿。`,
     en:`Mature trunks often develop <em class="term">buttress roots</em> — the classic support of tall rainforest trees, anchoring an otherwise shallow root system. The bark is reddish-brown and flakes in patches. Growth is <strong>rhythmic</strong>: rather than extending continuously, the tree pushes new shoots in waves (flushes); young leaves emerge coppery or reddish before hardening to deep green.`},
    {t:"plate", svg:"habit", no:{zh:"图版 I",en:"PLATE I"},
     cap:{zh:"树体建成：1 不规则浓密树冠 · 2 烛台状主枝 · 3 老茎生花与悬垂果 · 4 浅生吸收根 · 5 侧根 · 6 主根（板根支撑）。",
          en:"Architecture: 1 irregular dense crown · 2 candelabra primary branches · 3 trunk-borne flowers & pendulous fruit · 4 shallow feeder roots · 5 laterals · 6 taproot with buttress support."}}
  ]},

{ id:"trunk", lat:"truncus · lignum", title:{zh:"树干与木材解剖",en:"Trunk & Wood Anatomy"}, sub:{zh:"树皮 · 形成层 · 边材 · 心材",en:"bark · cambium · sapwood · heartwood"},
  blocks:[
    {t:"p",
     zh:`树干不只是支撑，更是一套运作中的结构。横切面显现出一圈圈同心分层，各司其职；其中两层对种植者尤其重要——<strong>把糖分送到树干果实的内树皮</strong>，以及<strong>作为最凶险病害入口的外树皮</strong>。`,
     en:`The trunk is more than a support — it is a working structure. A cross-section reveals concentric layers, each with a job; two matter enormously to growers: the <strong>inner bark that feeds the trunk-borne fruit</strong>, and the <strong>outer bark that is the entry point for the tree's most dangerous disease</strong>.`},
    {t:"facts", title:{zh:"由外而内",en:"From outside in"},
     rows:[
       [{zh:"外树皮 / 周皮",en:"Outer bark / periderm"},{zh:"保护层，带皮孔（lenticel）供气体交换；也是<strong>茎腐/斑块溃疡</strong>的入口。",en:"Protective layer with lenticels for gas exchange; also the entry point for <strong>patch canker</strong>."}],
       [{zh:"内树皮 / 次生韧皮部",en:"Inner bark / secondary phloem"},{zh:"活组织，把叶片制造的糖<strong>向下</strong>输送——供养老茎上的花与果（老茎生花）。",en:"Living tissue carrying sugars <strong>down</strong> from the leaves — feeding trunk-borne flowers and fruit (cauliflory)."}],
       [{zh:"维管形成层",en:"Vascular cambium"},{zh:"极薄的分生层，每季<strong>增粗树干</strong>：向外生韧皮部、向内生木质部。",en:"The thin dividing layer that <strong>adds girth</strong> each season — phloem outward, xylem inward."}],
       [{zh:"边材（功能木质部）",en:"Sapwood (functional xylem)"},{zh:"色浅的外层木材，<strong>向上</strong>输导水分与矿质。",en:"Pale outer wood conducting water and minerals <strong>upward</strong>."}],
       [{zh:"心材",en:"Heartwood"},{zh:"色深、不再输导的核心，提供机械强度。",en:"The darker, non-conducting core giving mechanical strength."}],
       [{zh:"髓与射线",en:"Pith & rays"},{zh:"中央为髓；放射状的射线横向储运养分。",en:"A central pith; radial rays store and move nutrients across the trunk."}]
     ]},
    {t:"plate", svg:"trunk", no:{zh:"图版 III",en:"PLATE III"},
     cap:{zh:"树干横切面：1 外树皮·2 韧皮部·3 形成层·4 边材·5 心材·6 髓·7 年轮（赤道常绿树常不明显），放射线为髓射线。",
          en:"Trunk cross-section: 1 outer bark · 2 phloem · 3 cambium · 4 sapwood · 5 heartwood · 6 pith · 7 growth ring (often faint in equatorial evergreens); the radial lines are rays."}},
    {t:"p",
     zh:`榴莲木质<strong>软、色浅、耐久性低</strong>，属次级木材而非硬木。由于赤道产区季节反差小，其<strong>年轮往往微弱或缺失</strong>——无法靠数年轮可靠地判断树龄。而因为花直接从树皮上萌发（老茎生花），韧皮部把糖送到树干表面的能力，直接影响树在何处、结多少果。`,
     en:`Durian wood is <strong>soft, pale and low in durability</strong> — a minor timber, not a hardwood. Because equatorial durians grow with little seasonal contrast, their <strong>growth rings are faint or absent</strong> — you cannot reliably age a tree by counting them. And because flowers emerge directly from the bark (cauliflory), the phloem's ability to deliver sugar to the trunk surface directly shapes where and how heavily the tree fruits.`},
    {t:"note", kind:"care",
     zh:`树皮是<strong>斑块溃疡（树干疫病，Phytophthora）</strong>的前线——下部树干出现深色、渗液的病斑，可环干致死。保持干基干燥、勿使受伤，避免割草机/机械碰伤，早发现早处理；<strong>一层完好的树皮，就是全树最重要的防线</strong>。`,
     en:`The bark is the front line for <strong>patch canker (trunk Phytophthora)</strong> — dark, oozing lesions on the lower trunk that can girdle and kill. Keep the trunk base dry and unwounded, avoid mower/mechanical damage, and treat early; <strong>an intact bark is the tree's single most important defence</strong>.`}
  ]},

{ id:"roots", num:"III", lat:"radix · mycorrhiza", title:{zh:"根系与菌根",en:"Roots & Mycorrhizae"}, sub:{zh:"浅生吸收根 · 外生菌根共生",en:"Shallow feeders · ectomycorrhizal symbiosis"},
  blocks:[
    {t:"p",
     zh:`实生（种子)苗有明显<em class="term">主根</em>；但吸收养分与水分的主力，是分布在土壤表层 <strong>0–30 厘米</strong>的密集<em class="term">吸收根（feeder roots）</em>。这层浅根既怕积水、也怕干裂，是水肥管理的关键区。嫁接树的根系结构受砧木影响，通常主根较不发达而侧根发达。`,
     en:`Seedling trees form a clear <em class="term">taproot</em>, but the workhorses for water and nutrient uptake are the dense <em class="term">feeder roots</em> in the top <strong>0–30 cm</strong> of soil. This shallow mat dislikes both waterlogging and drought, and is the zone that matters most for irrigation and fertiliser. Grafted trees have a root form shaped by the rootstock — usually a weaker taproot and well-developed laterals.`},
    {t:"p",
     zh:`榴莲的一个不寻常之处：它与真菌形成<em class="term">外生菌根（ectomycorrhiza）</em>——这在热带果树中相当少见（多数热带果树是内生/丛枝菌根）。真菌在根尖外形成菌套并向土壤延伸菌丝，大幅扩展吸收面积，帮助获取<strong>磷等移动性差的养分</strong>与水分，作为回报换取植物的碳水化合物。因此过度扰动表土、滥用杀菌剂都可能损害这层共生关系。`,
     en:`A striking peculiarity: durian forms <em class="term">ectomycorrhizae</em> — uncommon among tropical fruit trees, most of which host arbuscular (endo-) mycorrhizae. The fungus sheaths the root tips and extends hyphae into the soil, greatly enlarging the absorbing surface and helping capture <strong>phosphorus and other poorly-mobile nutrients</strong> plus water, in exchange for the tree's carbohydrates. Heavy topsoil disturbance and broad fungicide use can therefore harm this partnership.`},
    {t:"plate", svg:"root", no:{zh:"图版 VII",en:"PLATE VII"},
     cap:{zh:"根尖外生菌根：真菌菌套（金色）包裹短根并向土壤伸出菌丝网，交换养分与水分。",
          en:"Ectomycorrhizal root tips: a fungal mantle (gold) sheathes short roots and extends a hyphal net into the soil, trading nutrients and water."}},
    {t:"note", kind:"care",
     zh:`浅根 + 怕涝 = <span class="lat">Phytophthora</span> 疫病高风险。排水不良的低洼地、常年潮湿的树头，是根腐与茎溃疡的温床。`,
     en:`Shallow roots + poor drainage = high <span class="lat">Phytophthora</span> risk. Low, badly-drained spots and a permanently wet collar are where root rot and stem canker take hold.`}
  ]},

{ id:"leaves", num:"IV", lat:"folium · lepidotum", title:{zh:"叶片",en:"Leaves"}, sub:{zh:"单叶互生 · 背面被鳞",en:"Simple, alternate · scaly beneath"},
  blocks:[
    {t:"p",
     zh:`叶为<em class="term">单叶、互生</em>，呈螺旋状排列。叶片<strong>椭圆至长圆状披针形，长约 10–18 厘米</strong>，先端渐尖、基部圆钝，质地革质。上表面深绿而有光泽；下表面因密被<em class="term">盾状鳞片（peltate scales）</em>而呈古铜色或银灰色——这层鳞片是识别榴莲叶的关键特征，也反映其对强光雨林环境的适应。`,
     en:`Leaves are <em class="term">simple and alternate</em>, arranged spirally. The blade is <strong>elliptic to oblong-lanceolate, about 10–18 cm long</strong>, acuminate at the tip and rounded at the base, and leathery in texture. The upper surface is glossy dark green; the lower surface is coppery or silvery from a dense cover of <em class="term">peltate scales</em> — the key feature for recognising a durian leaf, and a sign of its adaptation to bright rainforest conditions.`},
    {t:"plate", svg:"leaf", no:{zh:"图版 II",en:"PLATE II"},
     cap:{zh:"叶的两面：上表面（左）深绿有光泽；下表面（右）被古铜色盾状鳞片，羽状脉明显。",
          en:"Both surfaces: adaxial (left) glossy dark green; abaxial (right) clad in coppery peltate scales, with clear pinnate venation."}},
    {t:"p",
     zh:`叶片是全树的<strong>“碳工厂”</strong>。榴莲行 <em class="term">C₃ 光合</em>，一波新梢的叶片成熟后即成为供应开花与果实的碳源。因此保住健康叶面积（防落叶病、防红蜘蛛、避免抽梢与结果严重争夺）直接关系到产量与果肉品质。`,
     en:`The leaves are the tree's <strong>carbon factory</strong>. Durian uses <em class="term">C₃ photosynthesis</em>, and once a flush hardens its leaves become the carbon source feeding flowering and fruiting. Protecting healthy leaf area — against leaf disease and mites, and against a flush competing too hard with a fruit load — bears directly on yield and flesh quality.`}
  ]},

{ id:"cauliflory", num:"V", lat:"caulifloria", title:{zh:"老茎生花",en:"Cauliflory & Flowering Habit"}, sub:{zh:"花直接着生于树干与老枝",en:"Flowers borne on trunk & old wood"},
  blocks:[
    {t:"p",
     zh:`榴莲最引人注目的习性之一是<em class="term">老茎生花（cauliflory）与老枝生花（ramiflory）</em>：花不是长在当年新梢的顶端，而是<strong>直接从主干和多年生老枝的树皮上成簇萌发</strong>。每一簇为聚伞花序，可由数朵至数十朵花组成，向下悬垂。`,
     en:`One of the durian's most striking traits is <em class="term">cauliflory and ramiflory</em>: flowers arise not at the tips of new shoots but <strong>directly from the bark of the trunk and older branches</strong>, in clusters. Each cluster is a cyme of a few to several dozen pendulous flowers.`},
    {t:"plate", svg:"cauliflory", no:{zh:"图版 III",en:"PLATE III"},
     cap:{zh:"老茎生花：花簇自树干与老枝的树皮直接萌发，向下悬垂——便于夜间传粉的蝙蝠接近。",
          en:"Cauliflory: clusters emerge straight from the bark of trunk and old wood, hanging downward — easy access for night-flying bat pollinators."}},
    {t:"p",
     zh:`这种结构并非偶然：把大而重、富含花蜜的花挂在坚固的老木上，正好方便<strong>体型较大的传粉者（尤其是蝙蝠）</strong>在昏暗林下停靠与取食，也为日后沉重的果实提供了牢固的着生点。开花与结果因此集中在树干和主枝，而非纤细的枝梢。`,
     en:`This is no accident: hanging large, heavy, nectar-rich flowers on sturdy old wood suits <strong>big pollinators — especially bats</strong> — which need something solid to land on in the dim understorey, and provides a strong anchor for the heavy fruit to come. Flowering and fruiting are thus concentrated on trunk and main limbs, not slender twigs.`}
  ]},

{ id:"flower", num:"VI", lat:"flos · structura", title:{zh:"花的结构",en:"Flower Structure"}, sub:{zh:"五基数 · 雄蕊成束 · 五室子房",en:"Five-parted · fascicled stamens · 5-locular ovary"},
  blocks:[
    {t:"p",
     zh:`一朵榴莲花从外到内包括：外面的<em class="term">副萼（epicalyx）</em>开裂后露出钟状、5 裂而合生的<em class="term">花萼</em>；<strong>5 片乳白至金黄色的花瓣</strong>；数目众多、<strong>集结成 5 束</strong>的雄蕊；以及位于中央的<em class="term">上位子房</em>。子房分为 <strong>5 室</strong>——这正对应日后果实的 5 个瓣室。花柱细长，顶端为头状柱头。`,
     en:`From outside in, a durian flower has: an <em class="term">epicalyx</em> that splits to reveal a bell-shaped, 5-lobed fused <em class="term">calyx</em>; <strong>five creamy-white to golden petals</strong>; numerous stamens gathered into <strong>five bundles (fascicles)</strong>; and a central <em class="term">superior ovary</em> divided into <strong>five loculi</strong> — matching the five valves of the future fruit. A slender style ends in a capitate stigma.`},
    {t:"plate", svg:"flower", no:{zh:"图版 IV",en:"PLATE IV"},
     cap:{zh:"花纵切：a 头状柱头 · b 雄蕊束（5 束） · c 花瓣 · d 五室上位子房 · e 钟状花萼与副萼、蜜腺。",
          en:"Flower in section: a capitate stigma · b stamen bundles (five) · c petals · d 5-locular superior ovary · e campanulate calyx with epicalyx & nectar."}},
    {t:"p",
     zh:`花在<strong>傍晚至夜间开放</strong>，寿命极短——通常一夜之间开放、授粉，翌晨即凋落。开放时分泌<em class="term">大量花蜜</em>，并散发出偏酸、类似发酵奶或黄油的气味。这套“夜开、多蜜、浓味、挂在老木上”的组合，是为夜行传粉者量身定制的信号系统。`,
     en:`Flowers open in the <strong>late afternoon and at night</strong> and are very short-lived — typically opening, being pollinated and dropping within a single night. They pour out <em class="term">copious nectar</em> and give off a sour, fermented-milk or buttery scent. This suite — night-opening, nectar-rich, strongly scented, borne on old wood — is a signalling system tuned to nocturnal pollinators.`},
    {t:"facts", title:{zh:"花的要点",en:"Flower key facts"}, rows:[
      [{zh:"着生",en:"Borne on"},{zh:"树干·老枝（聚伞簇）",en:"trunk & old wood, in cymes"}],
      [{zh:"开放时间",en:"Anthesis"},{zh:"傍晚至夜间",en:"late afternoon–night"}],
      [{zh:"花寿命",en:"Flower lifespan"},{zh:"约 1 天（一夜）",en:"about one day (a night)"}],
      [{zh:"子房",en:"Ovary"},{zh:"上位 · 5 室",en:"superior · 5-locular"}],
      [{zh:"雄蕊",en:"Stamens"},{zh:"多数 · 5 束",en:"numerous · 5 bundles"}]
    ]}
  ]},

{ id:"pollination", num:"VII", lat:"pollinatio · Chiroptera", title:{zh:"授粉",en:"Pollination"}, sub:{zh:"果蝠为主 · 异花授粉增产",en:"Bat-driven · cross-pollination boosts set"},
  blocks:[
    {t:"p",
     zh:`榴莲的主要传粉者是<em class="term">果蝠</em>，其中<span class="lat">Eonycteris spelaea</span>（洞栖/黎明果蝠）被认为是关键角色：它们夜间取食花蜜，身上沾满花粉，在树间与花间穿梭完成传粉。飞狐、某些鸟类与昆虫（蜜蜂、蛾）也有次要贡献。`,
     en:`The durian's chief pollinators are <em class="term">nectar bats</em>, with <span class="lat">Eonycteris spelaea</span> (the cave / dawn bat) regarded as the key species: feeding on nectar at night, they become dusted with pollen and carry it between flowers and trees. Flying foxes, some birds and insects (bees, moths) play secondary roles.`},
    {t:"plate", svg:"pollen", no:{zh:"图版 V",en:"PLATE V"},
     cap:{zh:"夜间授粉：果蝠悬垂取蜜，体毛沾满花粉，在花间传递——主授粉者 Eonycteris spelaea。",
          en:"Pollination at night: a nectar bat hovers to feed, its fur laden with pollen carried between flowers — chief pollinator Eonycteris spelaea."}},
    {t:"p",
     zh:`多数栽培品种<strong>自交亲和性低甚至自交不亲和</strong>，同一花粉往往难以有效结实。因此<em class="term">异花（异品种）授粉</em>能显著提高<strong>坐果率</strong>并改善果形（减少缺瓣、偏心）。这也是果园混栽不同品种、以及在花期进行<strong>人工辅助授粉</strong>的原因：在夜间用毛刷把不同株的花粉转移到柱头上，可明显提升产量与果实端正度。`,
     en:`Most cultivars are <strong>weakly self-fertile or self-incompatible</strong>, so a flower's own pollen sets fruit poorly. <em class="term">Cross-pollination</em> between clones markedly raises <strong>fruit set</strong> and improves shape (fewer missing or lopsided segments). Hence interplanting several cultivars, and <strong>hand pollination</strong> during bloom: brushing pollen from another tree onto receptive stigmas at night lifts both yield and fruit symmetry.`},
    {t:"note", kind:"field",
     zh:`保护授粉者就是保护产量。附近的蝙蝠栖息地（洞穴、老树）、以及为果蝠提供全年花蜜的“桥梁”植物（如某些红树、香蕉），都与榴莲丰产息息相关。`,
     en:`Protecting pollinators protects yield. Nearby bat roosts (caves, old trees) and "bridge" plants that supply nectar year-round for the bats (such as certain mangroves and bananas) are closely tied to good durian crops.`}
  ]},

{ id:"induction", num:"VIII", lat:"inductio floralis", title:{zh:"开花诱导",en:"Floral Induction"}, sub:{zh:"干旱胁迫 + 降雨触发",en:"Water stress, then rain"},
  blocks:[
    {t:"p",
     zh:`榴莲不是随时想开就开的。<strong>花芽的启动通常需要一段明显的干旱期</strong>：约 <strong>1–4 周</strong>的相对干燥、晴朗天气，使树体承受适度水分胁迫、暂停营养生长并积累碳水化合物；随后一场<em class="term">透雨</em>或水分回补，往往就成为解除休眠、花芽同步萌发的“扳机”。`,
     en:`Durian does not flower on demand. <strong>Bud initiation usually needs a distinct dry spell</strong>: roughly <strong>1–4 weeks</strong> of relatively dry, sunny weather that imposes mild water stress, pauses vegetative growth and lets carbohydrates accumulate. A following <em class="term">soaking rain</em> or re-watering then acts as the trigger that breaks dormancy and sets buds flushing in unison.`},
    {t:"plate", svg:"induction", no:{zh:"图版 IX",en:"PLATE IX"},
     cap:{zh:"开花诱导链：干旱期积累碳→降雨解除休眠→花芽萌发。若干旱被雨水打断，花期常紊乱。",
          en:"Induction chain: a dry spell builds carbon → rain breaks dormancy → buds flush. A drought interrupted by rain often scrambles bloom."}},
    {t:"p",
     zh:`这也是为什么天气对榴莲如此关键：如果预期的旱季被<strong>不合时宜的降雨</strong>反复打断，花芽会零散、多次萌发（“开花不齐”），造成同株上花果世代重叠、管理困难、落果加重。理解并跟踪当地的<em class="term">干湿节律</em>，几乎等同于预测花期。`,
     en:`This is why weather matters so much for durian: if the expected dry season is repeatedly broken by <strong>ill-timed rain</strong>, buds emerge in scattered waves ("uneven bloom"), leaving overlapping flower-and-fruit generations on one tree — harder to manage and more prone to drop. Reading and tracking the local <em class="term">wet–dry rhythm</em> is close to forecasting the bloom.`}
  ]},

{ id:"set", num:"IX", lat:"fructificatio", title:{zh:"坐果与落果",en:"Fruit Set & Drop"}, sub:{zh:"授粉后 · 自然疏果",en:"After pollination · natural thinning"},
  blocks:[
    {t:"p",
     zh:`授粉受精后，子房膨大、幼果坐住。榴莲会经历数次<em class="term">生理落果</em>——树体主动“疏果”，把资源集中到少数发育良好的果实上。从<strong>花开到幼果</strong>、再到<strong>膨大期</strong>，通常伴随两三波明显的落果高峰，尤其是在授粉不良、养分或水分不足、或天气骤变时更为严重。`,
     en:`After fertilisation the ovary swells and young fruit sets. Durian then goes through several waves of <em class="term">physiological fruit drop</em> — the tree self-thinning to concentrate resources on a well-developing few. Between <strong>bloom and young fruit</strong>, and again into <strong>rapid growth</strong>, there are typically two or three drop peaks, worse when pollination was poor, nutrients or water fall short, or weather swings sharply.`},
    {t:"plate", svg:"setdrop", no:{zh:"图版 IX",en:"PLATE IX"},
     cap:{zh:"从多花到少果：一簇繁花只有少数坐果，坐果后又经数次生理落果（离层脱落），最终每枝仅留 1–2 果——这是树体主动的自然疏减。",
          en:"From many flowers to few fruit: a mass of bloom sets only a few, then sheds more in waves of physiological drop (abscission), leaving just 1–2 fruit per branch — the tree's own natural thinning."}},
    {t:"p",
     zh:`适度落果是正常且必要的：<strong>一棵树能养好的果实数量有限</strong>。人工<em class="term">疏果</em>（保留位置好、果柄壮、果形正的幼果）能减少后期争夺、稳定果实大小与品质，也降低压枝、裂果与病害风险。硼、钾等养分与稳定的水分供应，对减少非正常落果尤为重要。`,
     en:`Some drop is normal and necessary: <strong>a tree can only finish a limited number of fruit</strong>. Deliberate <em class="term">thinning</em> — keeping young fruit that are well-placed, on strong stalks and of good shape — reduces later competition, steadies fruit size and quality, and lowers the risk of limb-breakage, splitting and disease. Boron and potassium nutrition and a steady water supply are especially important for limiting abnormal drop.`},
    {t:"note", kind:"field",
     zh:`口诀式判断：<strong>花不齐 → 果不齐 → 落果重</strong>。花期天气与授粉质量，往往在坐果后一个月才“结账”。`,
     en:`Rule of thumb: <strong>uneven bloom → uneven set → heavier drop</strong>. The bill for bloom-time weather and pollination quality often comes due about a month after set.`}
  ]},

{ id:"development", num:"X", lat:"auxesis fructus", title:{zh:"果实发育",en:"Fruit Development"}, sub:{zh:"S 形生长 · 品种决定天数",en:"Sigmoid growth · days vary by clone"},
  blocks:[
    {t:"p",
     zh:`从<strong>坐果到成熟</strong>，榴莲果实通常需要 <strong>约 90–150 天</strong>，具体天数因品种而异（例如“猫山王/Musang King”常在授粉后约 100–120 天成熟）。果实体积增长大致呈<em class="term">S 形（sigmoid）曲线</em>：初期缓慢、中期快速膨大、后期趋缓并进入成熟。`,
     en:`From <strong>set to maturity</strong>, durian fruit generally needs <strong>about 90–150 days</strong>, varying by cultivar (Musang King, for instance, often matures around 100–120 days after fruit-set). Fruit volume follows roughly a <em class="term">sigmoid curve</em>: slow at first, then rapid expansion, then tapering into maturation.`},
    {t:"plate", svg:"growth", no:{zh:"图版 VIII",en:"PLATE VIII"},
     cap:{zh:"果实生长的三个阶段：I 缓慢期 → II 快速膨大期（果肉/种子充实）→ III 成熟期。天数随品种变动。",
          en:"Three phases of growth: I lag → II rapid expansion (aril & seed filling) → III maturation. Duration varies by cultivar."}},
    {t:"p",
     zh:`中期的<strong>快速膨大</strong>是果肉与种子充实、干物质大量累积的阶段，对<em class="term">水分与钾</em>的需求最高；此时缺水会造成果小、果肉薄。后期果实进入成熟，<strong>淀粉转化、香气与风味物质形成</strong>，果肉质地变软。许多品种（如猫山王）传统上<strong>待其自然脱落</strong>后才收，以获得完全成熟的风味；也有品种在适熟时人工采下。`,
     en:`The mid-phase <strong>rapid expansion</strong> is when aril and seed fill and dry matter piles up, with the highest demand for <em class="term">water and potassium</em>; water shortage here yields small fruit with thin flesh. Late on, the fruit matures — <strong>starch converts, aroma and flavour compounds form</strong>, and the flesh softens. Many cultivars (Musang King among them) are traditionally left to <strong>drop naturally</strong> for full-ripe flavour, while others are cut at the right stage.`}
  ]},

{ id:"ripening", lat:"climactericum · maturatio", title:{zh:"呼吸跃变与后熟",en:"The Climacteric & Ripening"}, sub:{zh:"乙烯驱动 · 采后仍会成熟",en:"ethylene-driven · ripens after harvest"},
  blocks:[
    {t:"p",
     zh:`榴莲是<strong>呼吸跃变型（climacteric）</strong>果实：一旦达到生理成熟，即使离开母树也会继续成熟。这一过程由植物激素<em class="term">乙烯（ethylene）</em>的自我催化激增，与一波<em class="term">呼吸跃变（呼吸速率骤升）</em>共同驱动。理解这一点，几乎等于理解了榴莲所有的采收与采后决策。`,
     en:`Durian is a <strong>climacteric</strong> fruit: once it reaches physiological maturity it keeps ripening even after leaving the tree. The process is driven by a self-reinforcing (autocatalytic) surge of the hormone <em class="term">ethylene</em> together with a <em class="term">respiratory climacteric</em> — a sharp rise in respiration rate. Grasp this, and you grasp nearly every harvest and post-harvest decision in durian.`},
    {t:"plate", svg:"climacteric", no:{zh:"图版 XII",en:"PLATE XII"},
     cap:{zh:"后熟中的两条曲线：乙烯先陡升，触发呼吸跃变高峰。左侧为“剪果·仍硬”（跃变前采收）窗口，右侧接近“树上熟·脱落”，最终果壳开裂。",
          en:"The two curves of ripening: ethylene rises first and triggers the respiratory climacteric peak. The left marks the 'cut-mature' (pre-climacteric) harvest window; the right approaches tree-ripe abscission, ending in husk dehiscence."}},
    {t:"p",
     zh:`随着跃变推进，果实发生一连串变化：<strong>淀粉转化为糖</strong>（甜度上升）、<strong>细胞壁松解</strong>（果肉软化成奶油质地）、<strong>挥发性含硫化合物与酯类</strong>大量形成（那股标志性香气）、<strong>类胡萝卜素</strong>加深假种皮颜色；至完全成熟，果壳缝合线<em class="term">开裂（dehiscence）</em>。`,
     en:`As the climacteric runs, a cascade unfolds: <strong>starch converts to sugars</strong> (sweetness rises), <strong>cell walls loosen</strong> (flesh softens toward custard), <strong>volatile sulfur compounds and esters</strong> build (that signature aroma), and <strong>carotenoids</strong> deepen the aril's colour; at full ripeness the husk sutures <em class="term">dehisce</em> — split open.`},
    {t:"facts", title:{zh:"跃变前 vs 跃变后采收",en:"Pre- vs post-climacteric harvest"},
     rows:[
       [{zh:"剪果·跃变前（切果后熟派）",en:"Cut-mature · pre-climacteric"},{zh:"在呼吸跃变前采下、离树后熟；更硬、更温和、货架期更长 —— 泰国、越南出口路线。",en:"Harvested firm before the rise, ripened off-tree; firmer, milder, longer shelf — the Thai/Vietnam export route."}],
       [{zh:"树上熟·跃变中（树上熟派）",en:"Tree-ripened · on-tree climacteric"},{zh:"任其在树上成熟至自然脱落；香气更足、更软，但货架期短 —— 马来西亚高端，常冷冻。",en:"Left to ripen to abscission on the tree; fuller aroma, softer, short shelf — Malaysia's premium, often frozen."}]
     ]},
    {t:"p",
     zh:`由于乙烯与呼吸都很旺盛，鲜果<strong>货架期短</strong>。管理跃变的手段包括：以<em class="term">开花后天数＋干物质率</em>把握“跃变前的适熟”时机；<strong>低温冷藏</strong>与<strong>气调/低氧贮藏</strong>抑制呼吸、延迟果壳开裂（如猫山王在约 2–4% O₂ 下可多存约一周）；必要时用<em class="term">乙烯利（ethephon）</em>使成熟同步；以及<strong>冷冻</strong>（液氮/单体速冻，−18°C）——直接中止跃变，供远距离贸易。`,
     en:`Because both ethylene and respiration run high, fresh fruit has a <strong>short shelf life</strong>. Managing the climacteric means: timing harvest to <em class="term">pre-climacteric maturity</em> (days-after-flowering plus dry-matter); <strong>cold storage</strong> and <strong>controlled/low-O₂ atmosphere</strong> to slow respiration and delay husk dehiscence (e.g. Musang King held about a week longer under ~2–4% O₂); <em class="term">ethephon</em> to synchronise ripening when needed; and <strong>freezing</strong> (liquid-N / IQF at −18 °C), which halts the climacteric outright for long-distance trade.`},
    {t:"note", kind:"field",
     zh:`判断成熟的要点：跃变会外显 —— 香气渐浓、果柄/离层松动、轻叩有空响、缝线略微张开。<strong>关键一条：果实一旦剪下，只会变软、发展香气，却不会再增糖或增干物质。</strong>因此采收时的成熟度（而非单纯天数）决定了品质上限 —— 这正是干物质标准存在的原因。`,
     en:`Judging ripeness: the climacteric shows outwardly — aroma intensifies, the stem/abscission zone loosens, a tap sounds hollow, sutures ease open. <strong>The key rule: once cut, a durian only softens and develops aroma — it will not gain more sugar or dry-matter.</strong> So maturity at harvest (not days alone) sets the ceiling on quality — which is exactly why dry-matter standards exist.`}
  ]},

{ id:"postharvest", lat:"post messem · logistica", title:{zh:"采后保鲜与运输",en:"Post-harvest, Freshness & Transport"}, sub:{zh:"减少裂果 · 冷链 · 输往中国与新加坡",en:"reduce cracking · cold chain · to China & Singapore"},
  blocks:[
    {t:"p",
     zh:`从树到买家的每一步，本质上都是<em class="term">呼吸跃变管理</em>。有两个敌人：<strong>成熟与开裂</strong>（果实裂开、过软）和<strong>机械与冷害损伤</strong>。取胜之道是——<strong>在正确成熟度采收、迅速降温、轻柔搬运，并让温度匹配成熟度</strong>。`,
     en:`Every step from tree to buyer is really <em class="term">climacteric management</em>. There are two enemies: <strong>ripening and cracking</strong> (the fruit splits and over-softens) and <strong>mechanical and chilling damage</strong>. Winning means <strong>harvesting at the right maturity, cooling fast, handling gently, and matching temperature to ripeness</strong>.`},
    {t:"p",
     zh:`<strong>在农场保鲜、减少裂果</strong>：首先是<em class="term">按成熟度采收</em>——采太早，果实离树后 8–10 天就开裂、而且永远补不回甜度；采太晚则不耐运。成熟判断：果柄膨大且表面粗糙、果皮转色、刺变软、以橡胶头轻叩有空响、香气显现，并结合开花后天数。裂果（开裂＋胀裂）的防治：采前靠<strong>稳定水分＋钙、硼＋合理负载</strong>；采后靠<strong>尽快降温</strong>（低温减缓削弱离层的跃变）、<strong>高湿 85–95% RH 减少失重</strong>（失重越多、越早开裂）、可选<em class="term">食用蜡涂膜</em>，以及最重要的<strong>轻拿轻放</strong>——树落果用网接、切忌摔碰、装箱前务必清洁晾干（带湿易霉）。`,
     en:`<strong>Freshness and less cracking on the farm</strong>: it starts with <em class="term">harvesting at the right maturity</em> — too early and the fruit splits 8–10 days after harvest and never sweetens; too late and it won't travel. Maturity signs: a bulging, roughened peduncle, rind colour change, pliable spines, a hollow sound when tapped with a rubber-tipped stick, emerging aroma, plus days-after-flowering. Cracking (dehiscence and splitting) is fought pre-harvest with <strong>steady moisture, calcium and boron, and sensible crop load</strong>; post-harvest with <strong>prompt cooling</strong> (cold slows the climacteric that weakens the abscission zone), <strong>high humidity (85–95% RH) to limit weight loss</strong> (more weight loss means earlier splitting), an optional <em class="term">edible wax coating</em>, and above all <strong>gentle handling</strong> — net tree-drop fruit, never drop or knock it, and clean and dry it before packing (wet fruit moulds).`},
    {t:"facts", title:{zh:"冷链温度 · 按成熟度",en:"Cold-chain temperature · by ripeness"},
     rows:[
       [{zh:"剪果·未熟（到港后熟）",en:"Cut-mature · unripe (ripen on arrival)"},{zh:"13–15°C，RH 85–95%。低于约 13°C 会<strong>冷害</strong>：刺间沟纹变黑、无法正常后熟。",en:"13–15°C, 85–95% RH. Below ~13°C causes <strong>chilling injury</strong>: grooves blacken and the fruit fails to ripen."}],
       [{zh:"树上熟·已熟",en:"Tree-ripened · already ripe"},{zh:"更耐低温——约 <strong>7°C</strong> 可延缓果壳开裂达 ~14 天（猫山王）；果肉尤其耐寒。",en:"Tolerates colder — about <strong>7°C</strong> delays husk splitting up to ~14 days (Musang King); the pulp is especially cold-hardy."}],
       [{zh:"气调贮藏（CA）",en:"Controlled atmosphere (CA)"},{zh:"3–5% O₂ + 5–15% CO₂、~14°C，可延长至约 8 周（常规空气约 5 周）。",en:"3–5% O₂ + 5–15% CO₂ at ~14°C extends life to ~8 weeks (vs ~5 in air)."}],
       [{zh:"冷冻",en:"Frozen"},{zh:"液氮急冻后于 −18°C 贮运；保质 18–24 个月；<strong>跃变中止</strong>。",en:"Liquid-N flash freeze, then held at −18°C; 18–24 months; the climacteric is <strong>halted</strong>."}]
     ]},
    {t:"plate", svg:"coldchain", no:{zh:"图版 XIII",en:"PLATE XIII"},
     cap:{zh:"温度阶梯：未熟果须保持 13–15°C（低于此进入冷害区）；已熟的树落果可低至约 7°C 以延缓开裂；冷冻 −18°C 则中止跃变。关键——温度须匹配成熟度。",
          en:"The temperature ladder: unripe fruit must stay at 13–15°C (colder enters the chilling-injury zone); already-ripe tree-drop fruit can go to about 7°C to delay splitting; freezing at −18°C halts the climacteric. The key — match temperature to ripeness."}},
    {t:"p",
     zh:`<strong>包装</strong>：鲜果整果——放入<em class="term">发泡聚苯乙烯（EPS）泡沫箱</em>，果实不触箱壁以防碰伤，保持通风（榴莲呼吸放热、属“放热性”货物），可加冰袋，箱上标注“小心轻放”。冷冻——食品级真空封装，单体速冻（IQF）成瓣/整果或散装，用<strong>全程测温的冷藏（reefer）柜</strong>。每箱须标：品种、产地、净重、<strong>种植区代码与包装厂代码</strong>、包装/保质日期、以及可追溯二维码。`,
     en:`<strong>Packing</strong>: fresh whole fruit goes into an <em class="term">expanded-polystyrene (EPS) foam box</em>, not touching the sides (to prevent bruising), well ventilated (durian respires and gives off heat — an "exothermic" cargo), with an optional ice-gel pack and a "Handle With Care" mark. Frozen goes into food-grade vacuum packs — IQF pods/whole or bulk — in a <strong>reefer with continuous temperature logging</strong>. Every carton is labelled: variety, origin, net weight, <strong>growing-area and packing-facility codes</strong>, packing/expiry dates, and a traceability QR code.`},
    {t:"table",
     head:[{zh:"方式",en:"Mode"},{zh:"时长 · 温度",en:"Time · Temp"},{zh:"最适",en:"Best for"}],
     rows:[
       [{zh:"空运 Air",en:"Air freight"},"~2天·13–15°C",{zh:"高端树上熟鲜果（如吉隆坡→南宁约4小时）",en:"Premium tree-ripened fresh (e.g. KL→Nanning ~4 h)"}],
       [{zh:"海运冷藏 Sea reefer",en:"Sea reefer"},"~7–12天·−18°/13–15°",{zh:"大批量冷冻，或短程鲜果到华南口岸",en:"Bulk frozen, or short-haul fresh to south-China ports"}],
       [{zh:"陆运/铁路（越南）",en:"Land / rail (Vietnam)"},"3–8天",{zh:"边境鲜果过境；冷冻直达内陆",en:"Fresh across the border; frozen to inland China"}],
       [{zh:"新加坡 Singapore",en:"Singapore"},"数小时~次日·鲜运",{zh:"最近市场，鲜果为主（马来西亚陆运/空运）",en:"Nearest market, fresh-led (truck/air from Malaysia)"}]
     ]},
    {t:"p",
     zh:`<strong>输往中国</strong>：GACC 的<em class="term">种植区代码＋包装厂代码</em>是硬门槛，另需植物检疫证书、原产地证与<strong>农残（MRL）合规</strong>——超标退运还可能牵连吊销代码。鲜果宜走<strong>绿色通道快速清关</strong>。马来西亚：冷冻整果自 2019 年、<strong>鲜果整果自 2024 年</strong>（空运树上熟果）；广州/上海的<strong>保税冷库</strong>可延长分销。`,
     en:`<strong>To China</strong>: GACC <em class="term">growing-area plus packing-facility codes</em> are the hard gate, alongside a phytosanitary certificate, certificate of origin and <strong>residue (MRL) compliance</strong> — an over-limit rejection can even suspend the code. Fresh fruit should take the <strong>green-lane fast clearance</strong>. Malaysia: frozen whole since 2019 and <strong>fresh whole since 2024</strong> (air-freighted tree-ripened); <strong>bonded cold-stores</strong> in Guangzhou/Shanghai extend distribution.`},
    {t:"note", kind:"field",
     zh:`<strong>新加坡</strong>是马来西亚最近、历史上最大的榴莲市场（约占其出口一半）——短程冷藏陆运/空运偏向<strong>鲜果、树上熟</strong>，同时它也是先进冷链的转口枢纽。<strong>一条铁律：温度必须匹配成熟度。</strong>未熟果运得太冷，到货发黑且无法后熟；已熟果运得太暖，则开裂并过软。拿不准时，<strong>就冷冻</strong>。`,
     en:`<strong>Singapore</strong> is Malaysia's nearest and historically largest durian market (about half its exports) — short chilled truck/air transit favours <strong>fresh, tree-ripened</strong> fruit, and it also serves as an advanced cold-chain re-export hub. <strong>One iron rule: match temperature to ripeness.</strong> Ship unripe fruit too cold and it arrives black and won't ripen; ship ripe fruit too warm and it splits and over-softens. When in doubt, <strong>freeze</strong>.`}
  ]},

{ id:"certification", lat:"certificationes · conformitas", title:{zh:"出口认证与合规",en:"Certifications & Export Compliance"}, sub:{zh:"从农场到装运 · 中国 · 新加坡 · 其他",en:"farm to shipment · China · Singapore · beyond"},
  blocks:[
    {t:"p",
     zh:`每一颗出口的榴莲都要通过两道关：<strong>植物检疫（植物健康）</strong>与<strong>食品安全</strong>，再加上各市场的<strong>注册与准入</strong>。中国占据主导、门槛最严——缺一个代码或农残超标，货柜就被拒（还可能牵连吊销代码）。因此，<strong>证照要在产季之前备齐，而不是到了口岸才补</strong>。`,
     en:`Every exported durian must clear two gates — <strong>phytosanitary (plant health)</strong> and <strong>food safety</strong> — plus market-specific <strong>registration and access</strong>. China dominates and sets the strictest bar: miss a code or exceed an MRL and the container is rejected (and the code can be suspended). So the paperwork must be <strong>ready before the season, not improvised at the port</strong>.`},
    {t:"facts", title:{zh:"基础层 · 适用于任何市场",en:"The foundation stack · any market"},
     rows:[
       [{zh:"良好农业规范（GAP）",en:"Good Agricultural Practice (GAP)"},{zh:"果园层级：MyGAP（马）、GAP/Q（泰）、VietGAP、GlobalG.A.P.。",en:"Orchard level: MyGAP (MY), GAP/Q (TH), VietGAP, GlobalG.A.P."}],
       [{zh:"植物检疫证书",en:"Phytosanitary certificate"},{zh:"逐批签发，由出口国植保机构（NPPO）出具。",en:"Issued per shipment by the exporting country's plant-protection authority (NPPO)."}],
       [{zh:"农残检测报告（MRL）",en:"MRL test reports"},{zh:"由认可实验室出具，装运前完成。",en:"From an accredited laboratory, completed before shipment."}],
       [{zh:"食品安全体系（加工/冷冻）",en:"Food-safety system (processed/frozen)"},{zh:"GMP → HACCP → ISO 22000 → FSSC 22000；HACCP 为实务底线。",en:"GMP → HACCP → ISO 22000 → FSSC 22000; HACCP is the practical minimum."}],
       [{zh:"原产地证",en:"Certificate of Origin"},{zh:"Form E / RCEP，用于关税优惠（HS 0810.60）。",en:"Form E / RCEP for tariff preference (HS 0810.60)."}]
     ]},
    {t:"p",
     zh:`<strong>中国 —— 决定性市场</strong>：需先有<em class="term">双边植物检疫协议准入</em>（出口国须在中国批准名单内）；每个果园须有 <strong>GACC 种植区代码</strong>、每个包装厂须有<strong>包装厂代码</strong>，植检证须注明代码并声明合规、无检疫性有害生物。此外，生产/加工/仓储企业须依<em class="term">248/249 号令</em>在 <strong>CIFER（海关总署进口食品企业注册）</strong>注册（2022 年 1 月起；注册号须印于包装、有效期 5 年；冷冻水果属须由本国主管部门推荐的类别）。农残须符合 <strong>GB 2763</strong>（常超标的有毒死蜱、多菌灵、吡虫啉；越南另需注意镉与金胺 O）。包装须洁净未用、木质包装符合 <em class="term">ISPM 15</em>，箱唛标注品种/产地/果园与包装厂代码，托盘标“输往中华人民共和国”，并附二维码可追溯。2026 年<strong>280 号令</strong>又新增单证匹配要求。`,
     en:`<strong>China — the decisive market</strong>: it starts with <em class="term">bilateral phytosanitary protocol access</em> (the origin must be on China's approved list); every orchard needs a <strong>GACC growing-area code</strong> and every packer a <strong>packing-facility code</strong>, and the phytosanitary certificate must cite those codes and declare the consignment compliant and free of quarantine pests. On top of that, the producing/processing/storing establishment must register in <strong>CIFER (China Import Food Enterprise Registration)</strong> under <em class="term">Decrees 248 & 249</em> (since Jan 2022; the registration number goes on the packaging, valid five years; frozen fruit is a category that must be recommended by the home authority). Residues must meet <strong>GB 2763</strong> (chlorpyrifos, carbendazim and imidacloprid are the usual offenders; Vietnam also watches cadmium and Auramine O). Packaging must be clean and unused, wood must meet <em class="term">ISPM 15</em>, cartons carry the variety, origin and orchard/packhouse codes, pallets are marked "Exported to the People's Republic of China", with QR traceability. A 2026 <strong>Order 280</strong> adds document-matching requirements.`},
    {t:"plate", svg:"compliance", no:{zh:"图版 XIV",en:"PLATE XIV"},
     cap:{zh:"单证链：果园代码、包装厂代码、植检证、箱唛与报关单必须环环相扣、信息一致；任何一处不符，整柜都会被扣。",
          en:"The document chain: growing-area code, packing-facility code, phytosanitary certificate, carton label and customs declaration must interlock and agree; any single mismatch holds the whole container."}},
    {t:"table",
     head:[{zh:"市场",en:"Market"},{zh:"关键认证/要求",en:"Key certifications / requirements"},{zh:"备注",en:"Notes"}],
     rows:[
       [{zh:"中国",en:"China"},{zh:"协议准入＋GACC 果园/包装厂代码＋CIFER(248/249)＋植检证＋MRL(GB2763)＋原产地证",en:"Protocol access + GACC orchard/packhouse codes + CIFER (248/249) + phyto cert + MRL (GB 2763) + CO"},{zh:"门槛最严；无代码即被拒",en:"Strictest; no codes = rejected"}],
       [{zh:"新加坡",en:"Singapore"},{zh:"进口商持 SFA 鲜果蔬进口准证＋植检证；加工/冷冻须 HACCP/GMP",en:"Importer holds SFA fresh-produce import licence + phyto cert; processed/frozen needs HACCP/GMP"},{zh:"最近市场；准证由进口商持有",en:"Nearest market; licence sits with the importer"}],
       [{zh:"香港",en:"Hong Kong"},{zh:"一般食品安全合规＋进口商登记；无关税",en:"General food-safety compliance + importer registration; no tariff"},{zh:"制度最宽松",en:"Lightest regime"}],
       [{zh:"美国",en:"USA"},{zh:"FDA 设施注册＋FSMA；USDA-APHIS",en:"FDA facility registration + FSMA; USDA-APHIS"},{zh:"以冷冻/包装为主，鲜果受限",en:"Frozen/packaged led; fresh restricted"}],
       [{zh:"日本",en:"Japan"},{zh:"MAFF 植检＋最严 MRL 检查；JAS（有机时）",en:"MAFF phyto + strictest MRL checks; JAS (if organic)"},{zh:"审查最严、溢价高",en:"Highest scrutiny, premium price"}],
       [{zh:"欧盟/澳大利亚",en:"EU / Australia"},{zh:"欧盟 MRL＋植检（零售常要求 GLOBALG.A.P.）；澳洲生物安保严、多为冷冻",en:"EU MRLs + phyto (retail often expects GLOBALG.A.P.); Australia biosecurity-strict, mostly frozen"},{zh:"壁垒高",en:"High barrier"}]
     ]},
    {t:"p",
     zh:`<strong>新加坡</strong>：进口须由<em class="term">进口商</em>持有 SFA“鲜果蔬进口/转运准证”（经 GoBusiness/TradeNet 申请）并在海关激活 UEN；鲜榴莲归“鲜果蔬”类，逐批申领准证并附植检证。切果/冷冻榴莲归“加工食品”类，须 <strong>HACCP/GMP</strong> 等卫生生产证明。出口方的职责是<strong>备齐并提供这些支持性单证</strong>。`,
     en:`<strong>Singapore</strong>: import must be made by an <em class="term">importer</em> holding the SFA "Import/Transhipment of Fresh Fruits & Vegetables" licence (via GoBusiness/TradeNet) with a Customs-activated UEN; fresh durian is in the "fresh fruits & vegetables" class with a per-consignment permit and phytosanitary certificate. Cut or frozen durian is "processed food", needing <strong>HACCP/GMP</strong> proof of sanitary production. The exporter's job is to <strong>assemble and supply those supporting documents</strong>.`},
    {t:"note", kind:"care",
     zh:`一条实务铁律：证照链只有<strong>环环一致</strong>才放行——果园代码 ↔ 包装厂代码 ↔ 植检证 ↔ 箱唛 ↔ 报关单，信息必须完全对得上，一处不符即滞柜。产季前完成注册与检测、保留用药记录，并<strong>每季重新核对规则</strong>（标准会变，如中国的新令持续收紧）。最新条文以官方门户为准：GACC/CIFER 单一窗口、目的国的 NPPO 与食品主管机构。`,
     en:`One practical iron rule: the certificate chain only clears when <strong>every link agrees</strong> — orchard code ↔ packhouse code ↔ phyto cert ↔ carton label ↔ customs declaration must match exactly; one mismatch stalls the container. Register and test before the season, keep pesticide-use logs, and <strong>re-verify the rules every season</strong> (standards shift — China's newer orders keep tightening). For the current text, rely on the official portals: the GACC/CIFER single window and the destination country's NPPO and food agency.`}
  ]},

{ id:"fruit", lat:"fructus · arillus", title:{zh:"果实结构与果肉",en:"Fruit Structure & the Aril"}, sub:{zh:"带刺蒴果 · 五瓣室 · 假种皮",en:"Spiny capsule · 5 valves · the arillode"},
  blocks:[
    {t:"p",
     zh:`榴莲果实在植物学上是一个大型、木质化、<em class="term">带刺的蒴果</em>，成熟时可沿 <strong>5 条缝线</strong>开裂为 5 瓣，对应花中 5 室的子房。外壳密布尖硬的刺状突起（提供物理保护）；内壁为柔软的<em class="term">内果皮</em>，容纳果室。`,
     en:`Botanically the durian is a large, woody, <em class="term">spiny capsule</em> that at maturity splits along <strong>five sutures</strong> into five valves — matching the flower's 5-locular ovary. The husk is covered in sharp, hard spines for physical defence; the inner wall is a soft <em class="term">endocarp</em> holding the chambers.`},
    {t:"plate", svg:"fruit", no:{zh:"图版 VI",en:"PLATE VI"},
     cap:{zh:"果实外观与横切：带刺外壳；内部 5 室，每室含 1–数枚种子，外覆金黄色果肉（假种皮）。",
          en:"Fruit exterior & cross-section: spiny husk outside; five loculi within, each holding one to several seeds wrapped in golden aril."}},
    {t:"p",
     zh:`我们吃的“果肉”，其实是包裹种子的<em class="term">假种皮（aril / arillode）</em>——一层由珠柄发育而来的肉质组织，而非真正的果肉。每一室含 <strong>1 至数枚</strong>大种子，每枚被厚厚的假种皮包裹。果肉的颜色（乳白、金黄至橙红）、质地与风味，因品种而有巨大差异。`,
     en:`What we eat as "flesh" is actually the <em class="term">aril (arillode)</em> — a fleshy tissue developing from the seed stalk, not true fruit pulp — that wraps each seed. Every chamber holds <strong>one to several</strong> large seeds, each sheathed in thick aril. Colour (cream, gold, orange-red), texture and flavour of the aril differ enormously between cultivars.`},
    {t:"facts", title:{zh:"果实要点",en:"Fruit key facts"}, rows:[
      [{zh:"果实类型",en:"Fruit type"},{zh:"带刺蒴果（5 瓣裂）",en:"spiny capsule, 5-valved"}],
      [{zh:"瓣室数",en:"Loculi"},{zh:"通常 5",en:"usually 5"}],
      [{zh:"每室种子",en:"Seeds / locule"},{zh:"1–数枚",en:"one to several"}],
      [{zh:"可食部分",en:"Edible part"},{zh:"假种皮（arillode）",en:"the arillode"}],
      [{zh:"发育天数",en:"Days to mature"},{zh:"约 90–150（依品种）",en:"~90–150 (by cultivar)"}]
    ]}
  ]},

{ id:"flavour", lat:"sapor · odor · nutritio", title:{zh:"风味、香气与营养",en:"Flavour, Aroma & Nutrition"}, sub:{zh:"含硫挥发物 · 高能量 · 富钾",en:"sulfur volatiles · energy-dense · potassium-rich"},
  blocks:[
    {t:"p",
     zh:`是什么让榴莲尝起来、闻起来像榴莲，它在营养上又如何？果肉异常丰腴——<strong>糖高、脂肪也高</strong>（在水果中罕见）、能量密度大、富含钾；而那标志性的气味，来自<strong>果香酯类</strong>与<strong>浓烈含硫挥发物</strong>的混合。`,
     en:`What makes durian taste and smell like durian, and how does it stack up nutritionally? The flesh is unusually rich — <strong>high in both sugar and fat</strong> (rare among fruits), energy-dense and potassium-rich — while its signature aroma comes from a blend of <strong>fruity esters</strong> and <strong>pungent volatile sulfur compounds</strong>.`},
    {t:"plate", svg:"flavour", no:{zh:"图版 XV",en:"PLATE XV"},
     cap:{zh:"每 100 g 果肉约含能量 147 kcal、脂肪 5 g、碳水 27 g、钾 436 mg，血糖生成指数（GI）约 49；香气由酯类（果香、甜）与含硫物（葱蒜、浓烈）共同决定。",
          en:"Per 100 g of aril: about 147 kcal, 5 g fat, 27 g carbs, 436 mg potassium, and a glycaemic index around 49; the aroma is set by esters (fruity, sweet) together with sulfur compounds (oniony, pungent)."}},
    {t:"facts", title:{zh:"营养概览 · 每 100 g",en:"Nutrition at a glance · per 100 g"},
     rows:[
       [{zh:"能量",en:"Energy"},{zh:"~147 kcal——最能量密集的水果之一。",en:"~147 kcal — one of the most calorie-dense fruits."}],
       [{zh:"脂肪 / 碳水",en:"Fat / carbs"},{zh:"脂肪 ~5 g（水果中少见）、碳水 ~27 g（多为糖）——奶油质地的来源。",en:"~5 g fat (unusual for fruit) and ~27 g carbs (mostly sugars) — the source of the creamy texture."}],
       [{zh:"钾",en:"Potassium"},{zh:"~436 mg，比香蕉还多。",en:"~436 mg — more than a banana."}],
       [{zh:"血糖指数",en:"Glycaemic index"},{zh:"GI ~49，作为甜果偏低（得益于纤维与脂肪）。",en:"GI ~49 — low for a sweet fruit (thanks to fibre and fat)."}],
       [{zh:"也富含",en:"Also rich in"},{zh:"膳食纤维、维生素 C、B 族（B6、硫胺素、叶酸）。",en:"Dietary fibre, vitamin C and B-vitamins (B6, thiamin, folate)."}]
     ]},
    {t:"p",
     zh:`<strong>香气化学</strong>：那股气味来自两套化学——<em class="term">酯类</em>（如丙酸乙酯、2-甲基丁酸甲酯）带来果香与甜香；<em class="term">含硫挥发物</em>（如二乙基二硫、二乙基三硫、乙硫醇）带来葱蒜般的浓烈。品种间的平衡不同，风味从香草、杏仁、焦糖到偏咸鲜的葱蒜味不等——这也是各品种“味道不一样”的根源。`,
     en:`<strong>Aroma chemistry</strong>: the smell comes from two chemistries — <em class="term">esters</em> (such as ethyl propanoate and methyl-2-methylbutanoate) give fruity, sweet notes, while <em class="term">volatile sulfur compounds</em> (diethyl disulfide, diethyl trisulfide, ethanethiol) give the oniony pungency. Cultivars differ in the balance, so flavour ranges from vanilla, almond and caramel to savoury, allium-like — which is why varieties taste so different.`},
    {t:"note", kind:"field",
     zh:`营养丰富但能量高，宜适量（约 100–200 g）。两点有依据的提醒：① <strong>榴莲＋酒</strong>——其含硫化合物会抑制乙醛脱氢酶（ALDH，清除乙醛的酶），机理类似戒酒药，可致脸红、心悸、恶心；“榴莲与酒不同食”的老话确有科学支撑，最好间隔数小时。② <strong>钾高</strong>——慢性肾病或需限钾者应限量。以上为一般信息，非医疗建议。`,
     en:`Nutritious but energy-dense, so keep to moderate portions (~100–200 g). Two evidence-based cautions: ① <strong>durian + alcohol</strong> — its sulfur compounds can inhibit aldehyde dehydrogenase (ALDH, the enzyme that clears acetaldehyde), a disulfiram-like effect causing flushing, palpitations and nausea; the old "don't mix durian and alcohol" advice has real mechanistic support, so keep them hours apart. ② <strong>high potassium</strong> — those with chronic kidney disease or on potassium-restricted diets should limit intake. This is general information, not medical advice.`}
  ]},

{ id:"phenology", num:"XII", lat:"phaenologia", title:{zh:"物候周期",en:"Phenology — the Annual Cycle"}, sub:{zh:"抽梢→开花→坐果→膨大→采收·休整",en:"flush→flower→set→swell→harvest·rest"},
  blocks:[
    {t:"p",
     zh:`一整年里，榴莲树在几种“状态”之间循环切换：<strong>抽梢（长叶）→ 开花 → 坐果 → 果实膨大 → 采收与休整</strong>。健康的节律是<em class="term">营养生长与生殖生长交替进行</em>——先靠新梢与老叶积累碳，再把碳投入到花与果。`,
     en:`Across a year the tree cycles between states: <strong>flush (leafing) → flower → fruit set → fruit swell → harvest & rest</strong>. A healthy rhythm <em class="term">alternates vegetative and reproductive growth</em> — building carbon in new flushes and old leaves, then spending it on flowers and fruit.`},
    {t:"plate", svg:"wheel", no:{zh:"图版 X",en:"PLATE X"},
     cap:{zh:"年度物候轮：抽梢 → 开花 → 坐果 → 果实膨大 → 采收与休整，周而复始。热带地区可因气候出现一年一次或两次。",
          en:"The annual wheel: flush → flower → set → fruit swell → harvest & rest, turning round. Depending on climate, tropical trees may flower once or twice a year."}},
    {t:"p",
     zh:`在赤道气候下，若一年有两个旱季，部分产区可出现<strong>一年两造</strong>；但一造过重会削弱树势，导致下一造减产——即<em class="term">大小年（隔年结果）</em>倾向。因此“<strong>该抽梢时抽梢、该结果时结果</strong>”的节律管理，往往比单纯追产量更重要。`,
     en:`Near the equator, where two dry seasons occur, some regions get <strong>two crops a year</strong>; but an over-heavy crop drains the tree and cuts the next — the tendency to <em class="term">alternate (biennial) bearing</em>. Managing the rhythm — <strong>letting the tree flush when it should and fruit when it should</strong> — often matters more than chasing a single big yield.`}
  ]},

{ id:"carbon", num:"XIII", lat:"photosynthesis · translocatio", title:{zh:"光合与碳分配",en:"Photosynthesis & Carbon Partitioning"}, sub:{zh:"源与库 · 大小年成因",en:"source & sink · why bearing alternates"},
  blocks:[
    {t:"p",
     zh:`把树想成一套<em class="term">“源—库（source–sink）”</em>经济：叶片是碳的<strong>源</strong>，新梢、花、果与根是<strong>库</strong>。果实是极强的碳库——一株满载的榴莲，会把大量光合产物与储备碳抽调去充实果肉与种子。若叶面积不足或储备被掏空，树体就“透支”。`,
     en:`Think of the tree as a <em class="term">source–sink economy</em>: leaves are the <strong>source</strong> of carbon; new shoots, flowers, fruit and roots are the <strong>sinks</strong>. Fruit is an extremely strong sink — a heavily-laden durian diverts large amounts of photosynthate and stored carbon into filling aril and seed. If leaf area is short or reserves are drained, the tree runs a deficit.`},
    {t:"p",
     zh:`这正是<strong>大小年</strong>的生理根源：一个丰产年耗尽储备、抑制了新梢与花芽的形成，次年便减产；而减产年积累了储备，又迎来丰产。缓解之道包括<em class="term">合理疏花疏果、适时促梢、均衡施肥</em>，让“源”与“库”不至于长期失衡。`,
     en:`This is the physiological root of <strong>alternate bearing</strong>: a heavy year exhausts reserves and suppresses new flush and bud formation, so the next year is light; the light year rebuilds reserves and swings back to heavy. Remedies include <em class="term">thinning flowers and fruit, timing flushes, and balanced fertilising</em> so source and sink don't stay chronically out of step.`},
    {t:"plate", svg:"nutrient", no:{zh:"图版 XI",en:"PLATE XI"},
     cap:{zh:"不同阶段的养分需求：抽梢期偏氮（N），果实充实期钾（K）需求陡升，开花坐果期硼（B）不可或缺。",
          en:"Nutrient demand by stage: nitrogen (N) leads during flushing; potassium (K) rises steeply as fruit fills; boron (B) is essential around flowering and set."}}
  ]},

{ id:"nutrition", num:"XIV", lat:"nutritio", title:{zh:"营养需求",en:"Nutrition"}, sub:{zh:"N·P·K + 钙镁 + 硼锌",en:"N·P·K + Ca/Mg + B/Zn"},
  blocks:[
    {t:"p",
     zh:`不同养分在不同阶段扮演不同角色：<strong>氮（N）</strong>驱动抽梢与叶片生长；<strong>磷（P）</strong>关乎根系与花芽（并与菌根协同）；<strong>钾（K）</strong>是果实膨大与品质的关键，充实期需求最高。<strong>钙（Ca）、镁（Mg）</strong>维持细胞与叶绿素，钙不足与裂果、果肉障碍相关。`,
     en:`Each nutrient leads at a different stage: <strong>nitrogen (N)</strong> drives flushing and leaf growth; <strong>phosphorus (P)</strong> supports roots and bud formation (working with the mycorrhizae); <strong>potassium (K)</strong> is central to fruit swell and quality, peaking during filling. <strong>Calcium (Ca)</strong> and <strong>magnesium (Mg)</strong> maintain cell walls and chlorophyll; low calcium is linked to splitting and flesh disorders.`},
    {t:"p",
     zh:`微量元素中，<em class="term">硼（B）</em>对开花、授粉与坐果尤为重要——缺硼常见于<strong>坐果差、果形畸变</strong>。<strong>锌（Zn）</strong>缺乏会导致小叶、丛枝；铁、锰、铜在偏酸或失衡土壤中也可能受限。合理的做法是<em class="term">按物候分段供给</em>，并以叶片/土壤分析为依据，而非一味加大用量。`,
     en:`Among micronutrients, <em class="term">boron (B)</em> is especially important for flowering, pollination and set — deficiency shows as <strong>poor set and misshapen fruit</strong>. <strong>Zinc (Zn)</strong> shortage causes small, tufted leaves; iron, manganese and copper can be limited in acidic or unbalanced soils. The sound approach is to <em class="term">feed in step with phenology</em>, guided by leaf and soil analysis rather than simply raising rates.`},
    {t:"note", kind:"care",
     zh:`本页为通用生理原理，<strong>不是施肥处方</strong>。具体用量须依土壤/叶片检测、品种、树龄与产区而定，请结合当地农艺指导。`,
     en:`This page states general physiology, <strong>not a fertiliser prescription</strong>. Actual rates must follow soil/leaf tests, cultivar, tree age and region — consult local agronomic guidance.`},
    {t:"cards", items:[
      {k:{zh:"抽梢期",en:"FLUSH"},h:{zh:"氮为主",en:"Nitrogen-led"},p:{zh:"支持新梢与叶面积，为后续开花结果积累“源”。",en:"Builds shoots and leaf area — the source for later flowering and fruiting."}},
      {k:{zh:"花—坐果",en:"BLOOM–SET"},h:{zh:"硼·磷·钾",en:"B · P · K"},p:{zh:"硼保授粉与坐果，磷助花芽，钾稳果。",en:"Boron for pollination & set, phosphorus for buds, potassium to steady fruit."}},
      {k:{zh:"果实充实",en:"FRUIT FILL"},h:{zh:"钾为主 +钙镁",en:"Potassium + Ca/Mg"},p:{zh:"K 驱动膨大与品质；Ca 减裂果，Mg 保叶绿。",en:"K drives swell and quality; Ca limits splitting, Mg keeps leaves green."}},
      {k:{zh:"采后休整",en:"POST-HARVEST"},h:{zh:"恢复储备",en:"Rebuild reserves"},p:{zh:"补碳补肥、促健康新梢，缓解大小年。",en:"Restore carbon and nutrients, push healthy flush, ease alternate bearing."}}
    ]}
  ]},

{ id:"transport", lat:"translatio · systemica", title:{zh:"养分与农药的体内运输",en:"How Nutrients & Agrochemicals Move"}, sub:{zh:"木质部向上 · 韧皮部上下 · 内吸与触杀",en:"xylem up · phloem both ways · systemic vs contact"},
  blocks:[
    {t:"p",
     zh:`树体内有两套“管路”。<strong>木质部</strong>由蒸腾拉动，把水分与溶解的矿质<strong>单向向上</strong>从根送到叶。<strong>韧皮部</strong>把叶片制造的糖及可移动养分<strong>由源到库、可上可下</strong>地输送——去往新梢、果实与根。弄懂这两条路，既能读懂缺素症，也能读懂喷药为什么有时有效、有时无效。`,
     en:`The tree runs two "plumbing" systems. The <strong>xylem</strong>, pulled by transpiration, carries water and dissolved minerals <strong>one way, upward</strong> from roots to leaves. The <strong>phloem</strong> carries the sugars and mobile nutrients made in the leaves <strong>from source to sink, up or down</strong> — to new shoots, fruit and roots. Understanding these two paths explains both deficiency symptoms and why a spray sometimes works and sometimes doesn't.`},
    {t:"plate", svg:"translocate", no:{zh:"图版 XV",en:"PLATE XV"},
     cap:{zh:"两条通路：木质部（水+矿质，单向上行）与韧皮部（糖+移动养分，源↔库双向）。叶为源，果与根为库；根同时负责吸收。",
          en:"Two pathways: xylem (water + minerals, one-way up) and phloem (sugars + mobile nutrients, source↔sink, both ways). Leaves are the source; fruit and roots are sinks; roots also do the uptake."}},
    {t:"facts", title:{zh:"两条通路对照",en:"The two pathways"},
     rows:[
       [{zh:"木质部 Xylem",en:"Xylem"},{zh:"由根向上；载水与矿质；由蒸腾驱动；单向。",en:"Root → up; carries water & minerals; driven by transpiration; one-way."}],
       [{zh:"韧皮部 Phloem",en:"Phloem"},{zh:"源↔库双向；载糖与移动养分；由源库压差驱动。",en:"Source ↔ sink, both ways; carries sugars & mobile nutrients; driven by source-sink pressure."}]
     ]},
    {t:"p",
     zh:`<strong>养分的“体内移动性”决定缺素症出现在哪里</strong>。<em class="term">可移动</em>的养分能经韧皮部从老叶调往新生部位，因此缺乏时<strong>先在老叶</strong>显现；<em class="term">不可移动</em>的养分一旦沉积就调不走，缺乏时<strong>先在新梢与果实</strong>显现。这正解释了榴莲的钙、硼问题为何出现在<strong>果实</strong>（裂果、坐果差）而非老冠层——因为果实蒸腾弱、钙硼又难移动，光靠叶面补、进入果实有限，需靠根系供应与时机把握。`,
     en:`<strong>A nutrient's mobility inside the plant decides where deficiency shows.</strong> <em class="term">Mobile</em> nutrients can be moved through the phloem from old leaves to new growth, so shortage appears <strong>in old leaves first</strong>; <em class="term">immobile</em> ones can't be relocated once deposited, so shortage appears <strong>in new shoots and fruit first</strong>. This is exactly why durian's calcium and boron problems show up in the <strong>fruit</strong> (splitting, poor set) rather than the old canopy — the fruit transpires little and Ca/B barely move, so foliar feeding reaches the fruit only partly; root supply and timing matter.`},
    {t:"table",
     head:[{zh:"体内移动性",en:"Mobility in plant"},{zh:"养分",en:"Nutrients"},{zh:"缺素先见于",en:"Deficiency shows first in"}],
     rows:[
       [{zh:"可移动",en:"Mobile"},{zh:"N · P · K · Mg（及 S/Mo）",en:"N · P · K · Mg (and S/Mo)"},{zh:"老叶",en:"Old leaves"}],
       [{zh:"不可移动",en:"Immobile"},{zh:"Ca · B（及 Fe/Mn/Zn/Cu 较难移）",en:"Ca · B (and Fe/Mn/Zn/Cu, poorly mobile)"},{zh:"新梢 · 果实",en:"New shoots · fruit"}]
     ]},
    {t:"p",
     zh:`<strong>农药也遵循同样的物理规律</strong>，其“移动性”决定用法：<em class="term">触杀/非内吸</em>只停留在表面（如铜/波尔多液、代森锰锌），必须均匀覆盖、易被雨水冲走；<em class="term">木质部内吸（向上，acropetal）</em>随水上行（如甲霜灵/甲霜灵-M），根部或叶面吸收后送往地上部，但难以从叶片回到根；<em class="term">韧皮部内吸/上下双向（ambimobile）</em>是唯一能<strong>抵达根部</strong>的一类——磷酸盐类（膦酸铝 fosetyl-Al、亚磷酸/亚磷酸钾）是目前<strong>唯一商用的韧皮部内吸杀菌剂</strong>，叶面喷施或<strong>树干注射</strong>都能到达根系。这正是它对付榴莲头号威胁——根/干疫病（Phytophthora）——的原理；而单靠叶面的触杀剂永远到不了根。`,
     en:`<strong>Agrochemicals follow the same physics</strong>, and their mobility dictates how they're used: <em class="term">contact / non-systemic</em> stays on the surface (copper/Bordeaux, mancozeb) — it must cover the target evenly and washes off; <em class="term">xylem-systemic (upward, acropetal)</em> rides the water stream (metalaxyl / metalaxyl-M) — taken up by roots or leaves and moved to the shoots, but it won't travel back down from a leaf to the roots; <em class="term">phloem-systemic / ambimobile (both ways)</em> is the only class that <strong>reaches the roots</strong> — the phosphonates (fosetyl-Al, phosphorous acid/potassium phosphonate) are the <strong>only commercial phloem-mobile fungicides</strong>, so a foliar spray or a <strong>trunk injection</strong> reaches the root system. That is exactly how they counter durian's number-one threat — root and trunk Phytophthora — where a contact spray on the leaves never could.`},
    {t:"table",
     head:[{zh:"类型",en:"Type"},{zh:"体内移动",en:"Movement"},{zh:"例",en:"Example"},{zh:"用法含义",en:"What it means"}],
     rows:[
       [{zh:"触杀 / 非内吸",en:"Contact"},{zh:"不移动，留表面",en:"Doesn't move; stays on surface"},{zh:"铜/波尔多液·代森锰锌",en:"Copper/Bordeaux · mancozeb"},{zh:"须全覆盖；防护为主；易冲刷",en:"Cover fully; protectant; washes off"}],
       [{zh:"木质部内吸",en:"Xylem-systemic"},{zh:"向上（acropetal）",en:"Upward (acropetal)"},{zh:"甲霜灵/甲霜灵-M",en:"Metalaxyl / metalaxyl-M"},{zh:"土施或叶面上行；难回根",en:"Soil/foliar → moves up; won't return to roots"}],
       [{zh:"韧皮部/双向内吸",en:"Phloem / ambimobile"},{zh:"上下皆可，达根",en:"Both ways; reaches roots"},{zh:"磷酸盐（膦酸铝·亚磷酸）",en:"Phosphonates (fosetyl-Al, phosphorous acid)"},{zh:"叶面或树干注射治根/干疫病",en:"Foliar or trunk-inject for root/trunk rot"}]
     ]},
    {t:"note", kind:"care",
     zh:`这是<strong>原理，不是用药处方</strong>。要点：把用法匹配到移动性（触杀重覆盖、内吸看方向、根病选韧皮部内吸/注射）；<strong>轮换作用机理</strong>以防抗性（榴莲疫霉对甲霜灵的抗性已有报道）；树干注射的剂量与操作依<strong>当地指导</strong>。所有用药务必遵守标签与残留限量（MRL）——尤其面向中国出口的果园。`,
     en:`This is <strong>principle, not a spray prescription</strong>. The takeaways: match method to mobility (contact needs coverage, systemics depend on direction, root disease needs a phloem-mobile/injected product); <strong>rotate modes of action</strong> to manage resistance (metalaxyl resistance is already reported in durian Phytophthora); and follow <strong>local guidance</strong> for trunk-injection doses and technique. Every application must respect the label and residue limits (MRLs) — especially for orchards exporting to China.`}
  ]},

{ id:"water", num:"XV", lat:"relationes aquae", title:{zh:"水分关系",en:"Water Relations"}, sub:{zh:"要旱得出花 · 要水养得大",en:"dry to flower · wet to fill"},
  blocks:[
    {t:"p",
     zh:`榴莲的水分管理有一种“<strong>先旱后水</strong>”的双重性：<em class="term">适度水分胁迫</em>是诱导开花所必需（见第八节）；但一旦坐果、进入膨大期，<strong>充足而稳定的水分</strong>又变得至关重要。膨大期缺水会造成果小、果肉薄、品质下降。`,
     en:`Durian's water management is two-sided — <strong>dry first, then wet</strong>. <em class="term">Mild water stress</em> is needed to induce flowering (see §VIII); but once fruit sets and expansion begins, an <strong>ample, steady water supply</strong> becomes essential. Water shortage during filling yields small fruit with thin, poorer flesh.`},
    {t:"p",
     zh:`然而“多水”并非越多越好：<strong>骤旱骤湿</strong>——尤其是干旱后突然大水——常诱发<em class="term">裂果</em>与落果；长期积水则直接威胁浅生根系，招致疫病与根腐。理想状态是<strong>膨大期均匀供水、雨季确保排水</strong>，避免树头长期潮湿。`,
     en:`Yet more water is not always better: <strong>sudden swings</strong> — especially heavy water after drought — often trigger <em class="term">fruit splitting</em> and drop, while prolonged waterlogging directly threatens the shallow roots, inviting Phytophthora and root rot. The ideal is <strong>even moisture during filling and reliable drainage in the wet season</strong>, keeping the collar from staying wet.`},
    {t:"facts", title:{zh:"水分节律",en:"Water rhythm"}, rows:[
      [{zh:"诱花期",en:"To induce bloom"},{zh:"适度干旱胁迫",en:"mild dry stress"}],
      [{zh:"花—坐果",en:"Bloom–set"},{zh:"避免骤旱骤湿",en:"avoid sudden swings"}],
      [{zh:"果实膨大",en:"Fruit fill"},{zh:"均匀充足供水",en:"even, ample supply"}],
      [{zh:"全程",en:"Always"},{zh:"良好排水·防积水",en:"good drainage, no waterlogging"}]
    ]}
  ]},

{ id:"climate", num:"XVI", lat:"clima · solum", title:{zh:"气候与土壤",en:"Climate & Soil"}, sub:{zh:"炎热·湿润·排水良好",en:"hot · humid · well-drained"},
  blocks:[
    {t:"p",
